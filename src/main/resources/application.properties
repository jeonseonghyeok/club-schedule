spring.application.name=moyora clubSchedule
spring.profiles.include=private
server.port = 8081
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

mybatis.type-aliases-package=com.moyora.clubschedule
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
spring.mvc.hiddenmethod.filter.enabled=true

# Spring Web 및 MyBatis 관련 로그 레벨
logging.level.org.springframework.web=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.org.mybatis.spring.SqlSessionFactoryBean=DEBUG
logging.level.org.apache.ibatis.logging=DEBUG
logging.level.org.apache.ibatis=DEBUG
# MyBatis 로깅 구현체를 STDOUT_LOGGING으로 설정 (SQL을 콘솔에 출력)
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Thymeleaf에서 발생하는 TemplateInputException 등 반복적인 디버그 로그를 줄이기 위해 레벨을 ERROR로 설정
logging.level.org.thymeleaf=ERROR

# Test auth — set test.auth.secret in application-private.properties for dev only
# Leave blank (default) to disable entirely in production
test.auth.secret=${test_auth_secret:}

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${datasource_url}
spring.datasource.username=${datasource_username}
spring.datasource.password=${datasource_password}