<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드</title>
</head>
<body>
    <h1>관리자 대시보드</h1>
    <p>관리자용 기능을 이곳에 추가하세요.</p>
    <p>로그인된 사용자: <span th:text="${userKey}"></span></p>
    <p>권한: <span th:text="${roles}"></span></p>

    <div th:if="${isAdmin}">
        <p>관리자 전용 기능들이 표시됩니다.</p>
        <!-- 관리자 기능 링크 예시 -->
        <ul>
            <li><a href="/admin/group-requests">그룹 신청 관리</a></li>
        </ul>
    </div>

    <div th:if="${!isAdmin}">
        <p>관리자 권한이 필요합니다.</p>
    </div>

    <a href="/">메인으로</a>
</body>
</html>
