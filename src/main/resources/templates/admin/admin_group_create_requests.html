<!-- groupCreateRequestsPanel fragment -->
<div th:fragment="groupCreateRequestsPanel">
    <h1>그룹 생성 요청 관리</h1>
    <table border="1" class="admin-table">
        <thead>
            <tr><th>Request ID</th><th>User Key</th><th>Group Name</th><th>Requested At</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${pendingRequests}">
            <td th:text="${r.requestId}"></td>
            <td th:text="${r.userKey}"></td>
            <td th:text="${r.groupName}"></td>
            <td th:text="${r.requestedAt}"></td>
            <td>
                <button type="button" th:onclick="|adminApprove('/group-requests/' + ${r.requestId} + '/approve', 'POST', '승인되었습니다.')|">승인</button>
                <button type="button" th:onclick="|adminReject('/group-requests/' + ${r.requestId} + '/reject', 'POST', ${r.requestId}, '거부되었습니다.')|">거부</button>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/admin">관리자 홈으로</a>
</div>
