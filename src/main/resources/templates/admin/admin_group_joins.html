<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>그룹 가입 요청 관리</title>
    <th:block th:replace="fragments :: csrfMeta"></th:block>
</head>
<body>
<!-- groupJoinsPanel fragment -->
<div th:fragment="groupJoinsPanel">
    <h1>그룹 가입 요청 관리</h1>
    <table border="1" class="admin-table">
        <thead>
            <tr><th>Request ID</th><th>Group ID</th><th>User Key</th><th>Requested At</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="r : ${pendingJoins}">
            <td th:text="${r.requestId}"></td>
            <td th:text="${r.groupId}"></td>
            <td th:text="${r.userKey}"></td>
            <td th:text="${r.requestedAt}"></td>
            <td>
                <button type="button" th:onclick="|adminApprove('/groups/joins/' + ${r.requestId} + '/approve', 'PATCH', '승인되었습니다.')|">승인</button>
                <button type="button" th:onclick="|adminReject('/groups/joins/' + ${r.requestId} + '/reject', 'PATCH', ${r.requestId}, '거부되었습니다.')|">거부</button>
            </td>
        </tr>
        </tbody>
    </table>
    <a href="/admin">관리자 홈으로</a>
</div>
</body>
</html>
