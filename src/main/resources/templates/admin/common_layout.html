<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="baseHead">
    <meta charset="UTF-8" />
    <title th:text="${pageTitle} ?: '관리자 대시보드'">관리자 대시보드</title>
    <th:block th:replace="fragments :: csrfMeta"></th:block>

    <!-- Styles (kept minimal) -->
    <style>
        * { box-sizing: border-box; }
        body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; color:#0f172a; background:linear-gradient(180deg,#f8fafc,#f1f5f9); }
        .container { max-width:980px; margin:24px auto; padding:0 16px; }
        .card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,0.06); border:1px solid rgba(2,6,23,0.04); }
        .btn { display:inline-flex; align-items:center; gap:8px; background:#0f172a; color:#fff; padding:8px 12px; border-radius:10px; border:none; cursor:pointer; font-weight:700; }
        .btn.secondary { background:#f1f5f9; color:#0b1220; border:1px solid #e2e8f0; }
        .tabs { display: flex; gap: 8px; border-bottom: 1px solid #e2e8f0; margin-bottom: 12px; }
        .tab { padding: 8px 12px; cursor: pointer; background: #f8fafc; border-radius: 6px 6px 0 0; border: 1px solid #e2e8f0; border-bottom: none; }
        .tab.active { background: white; font-weight: 600; box-shadow: 0 -2px 0 rgba(37,99,235,0.08) inset; }
        .panel { display: none; padding: 16px; border: 1px solid #e2e8f0; background: white; border-radius: 0 6px 6px 6px; }
        .panel.active { display: block; }
    </style>

    <!-- Core scripts: use Thymeleaf for server paths and relative src for static file preview -->
    <script th:src="@{/js/admin.js}" src="../../static/js/admin.js"></script>
    <script th:src="@{/js/admin-renderer.js}" src="../../static/js/admin-renderer.js"></script>
    <script th:src="@{/js/admin-pagination.js}" src="../../static/js/admin-pagination.js"></script>
</head>
</html>
