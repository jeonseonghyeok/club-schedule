<!-- Consolidated admin fragments: usersPanel, groupsPanel, groupRequestsPanel, groupJoinsPanel -->
<!-- This file was generated by merging files from admin/fragments/* -->

<!-- Reusable results container fragment: use like th:replace="admin/fragments :: resultsTable('usersPanel')" -->
<div th:fragment="resultsTable(panelId)">
    <div th:id="${'admin-common-results-' + panelId}" class="common-results" style="margin-bottom:12px;"></div>
    <!-- pagination wrapper: per-panel slot for pagination controls -->
    <div class="pagination-wrapper" th:id="${'admin-common-pagination-' + panelId}" style="margin-top:8px;"></div>
</div>

<!-- users fragment -->
<div th:fragment="usersPanel" id="usersPanel" class="panel" data-loaded="false">
    <h2>회원관리</h2>
    <form id="users-search-form" style="display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <!-- 이름과 권한을 분리: 이름 입력 + 권한 선택 -->
            <div style="display:flex;flex-direction:column;">
                <label for="user-name" style="font-size:12px;color:#333;margin-bottom:2px;">이름</label>
                <input id="user-name" name="name" type="search" placeholder="이름 입력하세요" style="padding:6px;border:1px solid #ccc;border-radius:4px;min-width:160px;" />
            </div>

            <div style="display:flex;flex-direction:column;">
                <label for="user-role" style="font-size:12px;color:#333;margin-bottom:2px;">권한</label>
                <select id="user-role" name="role" style="padding:6px;border:1px solid #ccc;border-radius:4px;">
                    <option value="">전체</option>
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <!-- 가입일 기간 -->
            <div style="display:flex;flex-direction:column;">
                <label style="font-size:12px;color:#333;margin-bottom:2px;">가입일 (기간)</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input id="user-joined-from" name="joinedFrom" type="date" style="padding:6px;border:1px solid #ccc;border-radius:4px;" />
                    <span style="color:#666;">~</span>
                    <input id="user-joined-to" name="joinedTo" type="date" style="padding:6px;border:1px solid #ccc;border-radius:4px;" />
                </div>
            </div>

            <!-- 조회 버튼 -->
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-left:auto;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <button id="user-search" type="button" style="padding:6px 12px;background:#1976d2;color:#fff;border:none;border-radius:4px;cursor:pointer;">조회</button>
                </div>
            </div>
        </div>

        <!-- 결과 영역은 공통 컨테이너(#admin-common-results-<panel>)에 렌더링됩니다 -->

    </form>
    <!-- per-panel common results container (componentized) placed AFTER the form so results appear below the form -->
    <th:block th:replace="admin/fragments :: resultsTable('usersPanel')"></th:block>
</div>

<!-- groups fragment -->
<div th:fragment="groupsPanel" id="groupsPanel" class="panel" data-loaded="false">
    <h2>그룹관리</h2>
    <form id="groups-search-form" style="display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <select id="group-cond1" name="cond1Field">
                <option value="">선택</option>
                <option value="group">그룹</option>
                <option value="description">설명</option>
                <option value="requester">요청자</option>
            </select>
            <input id="group-cond1-value" name="cond1Value" type="search" placeholder="그룹번호 또는 그룹명 입력하세요" />

            <label>생성일:</label>
            <input id="group-created-from" name="createdFrom" type="date" /> ~ 
            <input id="group-created-to" name="createdTo" type="date" />

            <button id="groups-search" type="button">조회</button>
        </div>
    </form>
    <!-- per-panel common results container (componentized) placed AFTER the form so results appear below the form -->
    <th:block th:replace="admin/fragments :: resultsTable('groupsPanel')"></th:block>
</div>

<!-- group requests fragment -->
<div th:fragment="groupRequestsPanel" id="groupRequestsPanel" class="panel" data-loaded="false">
    <h2>그룹 신청관리</h2>
    <form id="gr-search-form" style="display:flex;flex-direction:column;gap:8px;">
        <div id="gr-controls" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
            <input id="gr-q" name="q" type="search" placeholder="모임명 검색" style="padding:6px;border:1px solid #ccc;border-radius:4px;min-width:160px;" />

            <select id="gr-status" name="status" style="padding:6px;border:1px solid #ccc;border-radius:4px;">
                <option value="PENDING" selected>대기 (기본)</option>
                <option value="">전체 이력</option>
                <option value="APPROVED">승인</option>
                <option value="REJECTED">거부</option>
                <option value="CANCELLED">취소</option>
            </select>

            <button id="gr-search" type="button">조회</button>
        </div>
    </form>
    <!-- per-panel common results container (componentized) placed AFTER the form so results appear below the form -->
    <th:block th:replace="admin/fragments :: resultsTable('groupRequestsPanel')"></th:block>
</div>

            <select id="gj-cond1" name="cond1Field">

                <option value="group">그룹</option>

            </select>
            <input id="gj-cond1-value" name="cond1Value" type="search" placeholder="그룹번호 또는 그룹명 입력하세요" />

            <label>가입요청일:</label>
            <input id="gj-from" name="from" type="date" /> ~
