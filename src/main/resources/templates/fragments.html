<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
</head>
<body>
<!-- CSRF meta: <head> 안에만 두세요 (div로 감싸지 않음) -->
<th:block th:fragment="csrfMeta">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}" />
</th:block>

<!-- 토스트 + CSRF 헤더 유틸 (본문 상단에 배치) -->
<th:block th:fragment="toastAndScripts">
    <style>
        #toast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: rgba(0,0,0,0.8); color: #fff; text-align: center; border-radius: 4px; padding: 12px; position: fixed; z-index: 1000; left: 50%; top: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; transform: translateY(-10px); }
        #toast.show { visibility: visible; opacity: 1; transform: translateY(0); }
        #toast.success { background-color: rgba(40,167,69,0.95); }
        #toast.error { background-color: rgba(220,53,69,0.95); }

        /* 로딩 UI (스피너 + 페이드인) - 접근성과 간단한 애니메이션 포함 */
        .loading {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
            opacity: 0;
            animation: fadeIn 0.18s ease forwards;
        }
        .loading .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.15);
            border-top-color: rgba(0,0,0,0.6);
            border-radius: 50%;
            box-sizing: border-box;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* .muted 스타일 보완 (기존을 건드리지 않음) */
        .muted { color: #6c757d; }
    </style>
    <div id="toast" role="status" aria-live="polite"></div>
    <script>
        function readCookie(name) {
            const enc = encodeURIComponent(name);
            const prefix = '; ' + enc + '=';
            const cookie = '; ' + document.cookie;
            const idx = cookie.indexOf(prefix);
            if (idx < 0) return null;
            const start = idx + prefix.length;
            const end = cookie.indexOf(';', start);
            const raw = end < 0 ? cookie.substring(start) : cookie.substring(start, end);
            try { return decodeURIComponent(raw); } catch (e) { return raw; }
        }

        function getCsrfHeaderName() {
            const fromMeta = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            if (fromMeta) return fromMeta;
            return 'X-XSRF-TOKEN';
        }

        function getCsrfTokenValue() {
            const fromMeta = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            if (fromMeta) return fromMeta;
            return readCookie('XSRF-TOKEN');
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.remove('success','error');
            if (type === 'success') toast.classList.add('success');
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(window._toastTimeout);
            window._toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 4000);
        }

        async function handleResponse(resp, successMsg) {
            if (resp.ok) {
                showToast(successMsg, 'success');
                setTimeout(() => location.reload(), 600);
                return;
            }
            let json = null;
            try { json = await resp.json(); } catch(e) {}
            const msg = json && json.error ? json.error : (json && json.message ? json.message : '서버 오류');
            showToast(msg, 'error');
        }

        function addCsrf(headers) {
            if (!headers) headers = {};
            const h = getCsrfHeaderName();
            const t = getCsrfTokenValue();
            if (h && t) headers[h] = t;
            return headers;
        }
    </script>
</th:block>

<!-- 알림 벨: main.html/group.html/admin_main.html 헤더 우측 슬롯에 삽입 -->
<th:block th:fragment="notifBell">
    <span id="notifBellWrap" style="position:relative;display:inline-block;">
        <button id="notifBellBtn" type="button" aria-label="알림" style="position:relative;background:none;border:none;cursor:pointer;font-size:1.25rem;line-height:1;padding:4px;">
            🔔
            <span id="notifBadge" style="display:none;position:absolute;top:-2px;right:-4px;background:#ef4444;color:#fff;border-radius:10px;min-width:16px;height:16px;font-size:11px;line-height:16px;text-align:center;padding:0 4px;font-weight:700;"></span>
        </button>
        <div id="notifDropdown" style="display:none;position:absolute;right:0;left:auto;top:100%;margin-top:6px;width:340px;max-height:420px;overflow:auto;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 8px 20px rgba(2,6,23,0.12);padding:10px;z-index:1000;text-align:left;">
            <div style="display:flex;align-items:center;gap:6px;border-bottom:1px solid #e2e8f0;padding-bottom:8px;margin-bottom:8px;">
                <button type="button" class="notif-tab active" data-filter="ALL" style="padding:4px 10px;border-radius:999px;background:#0f172a;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;">전체</button>
                <button type="button" class="notif-tab" data-filter="UNREAD" style="padding:4px 10px;border-radius:999px;background:#f1f5f9;color:#0b1220;border:none;font-size:12px;font-weight:700;cursor:pointer;">읽지 않음</button>
                <button type="button" id="notifMarkAllBtn" style="margin-left:auto;background:none;border:none;color:#2563eb;font-size:12px;cursor:pointer;font-weight:700;">모두 읽음</button>
            </div>
            <div id="notifList"></div>
            <div id="notifEmpty" style="display:none;color:#94a3b8;font-size:13px;padding:20px 0;text-align:center;">알림이 없습니다.</div>
        </div>
    </span>
</th:block>
</body>
</html>
