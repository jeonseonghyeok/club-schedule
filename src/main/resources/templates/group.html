<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>그룹 관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Basic layout matching main.html style */
        * { box-sizing: border-box; }
        body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; color:#0f172a; background:linear-gradient(180deg,#f8fafc,#f1f5f9); }
        .container { max-width:980px; margin:24px auto; padding:0 16px; }
        .card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,0.06); border:1px solid rgba(2,6,23,0.04); }
        .section-title { font-weight:700; margin:0 0 12px 0; font-size:1rem; color:#0b1220; display:flex; align-items:center; justify-content:space-between; }
        .tabs { display:flex; gap:8px; margin-bottom:12px; }
        .tab { padding:8px 12px; border-radius:8px; background:#f1f5f9; cursor:pointer; font-weight:700; }
        .tab.active { background:#0f172a; color:#fff; }
        .grid { display:grid; grid-template-columns: 1fr; gap:12px; }
        @media (min-width:900px) { .grid { grid-template-columns: 2fr 1fr; } }

        /* Description truncation to ~7 lines */
        .description { overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; white-space:pre-wrap; }
        .more-link { display:inline-flex; align-items:center; gap:4px; margin-top:8px; padding:4px 12px; border-radius:999px; background:#eff6ff; color:#2563eb; font-size:13px; font-weight:600; cursor:pointer; border:1px solid #dbeafe; transition:background .15s; }
        .more-link:hover { background:#dbeafe; }
        .join-btn { padding:8px 16px; border-radius:8px; background:#2563eb; color:#fff; font-weight:700; cursor:pointer; border:none; font-size:14px; }
        .join-btn:hover { background:#1d4ed8; }
        .join-btn:disabled { background:#94a3b8; cursor:default; }
        .join-pending { display:flex; align-items:center; gap:8px; }
        .join-pending-badge { padding:6px 12px; border-radius:999px; background:#fef9c3; color:#854d0e; font-size:13px; font-weight:600; }


        /* Management tab styles */
        .members-list, .schedules-list, .permissions-list { border-radius:10px; border:1px solid rgba(2,6,23,0.06); padding:12px; max-height:400px; overflow:auto; }
        .member-item { display:flex; justify-content:space-between; align-items:center; padding:8px; border-radius:8px; background:linear-gradient(180deg,#fff,#fcfeff); margin-bottom:8px; }
        .member-meta { color:#64748b; font-size:0.9rem; }
        .danger { background:#fff1f2; color:#981b1b; border:1px solid #fecaca; }

        /* Modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(2,6,23,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
        .modal { background:#fff; width:720px; max-width:95%; border-radius:10px; padding:18px; box-shadow:0 10px 30px rgba(2,6,23,0.28); }
        .modal .modal-header { display:flex; align-items:center; justify-content:space-between; }

        /* Calendar specific styles */
        #calendarFull { cursor: pointer; }

        /* 일정 상세 모달: 옵션(⋯) 드롭다운 */
        .opt-menu { display:none; position:absolute; right:0; bottom:100%; margin-bottom:6px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 20px rgba(2,6,23,0.12); min-width:120px; z-index:20; overflow:hidden; }
        .opt-menu-item { padding:8px 14px; font-size:13px; color:#1e293b; cursor:pointer; white-space:nowrap; }
        .opt-menu-item:hover { background:#f1f5f9; }

        /* 일정 상세 모달: 인원/정원 호버·탭 명단 팝오버 */
        .roster-popover { display:none; position:absolute; left:0; top:100%; margin-top:6px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 20px rgba(2,6,23,0.12); padding:8px 10px; min-width:160px; max-height:220px; overflow:auto; z-index:20; }
    </style>
</head>
<body>
<header style="padding:20px 0;">
    <div style="max-width:980px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:16px;">
        <div style="font-weight:700;font-size:1.125rem;">Club Schedule</div>
        <div style="margin-left:auto;"></div>
    </div>
</header>

<div class="container" th:attr="data-group-id=${group.groupId}, data-is-member=${isMember}, data-can-create-schedule=${canCreateSchedule}, data-create-needs-approval=${createNeedsApproval}, data-can-manage-schedule=${canManageSchedule}">
    <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div>
                <div style="font-weight:800; font-size:1.25rem;" th:text="${group.name}">그룹명</div>
<!--                <div style="color:#64748b; margin-top:6px;" class="member-meta">그룹 ID: <span th:text="${group.groupId}">1</span></div>-->
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <a th:href="@{/}" class="tab">목록으로</a>
            </div>
        </div>
    </div>
	
    <div class="card" style="margin-top:12px;">
        <div class="tabs" style="justify-content:space-between;">
            <div style="display:flex;gap:8px;">
                <div id="tabHome" class="tab active">홈</div>
                <div id="tabSchedule" class="tab">일정</div>
                <div id="tabManage" class="tab" th:if="${isManager}">관리</div>
            </div>
            <div id="joinAction" th:if="${!isMember}"></div>
        </div>

        <div th:if="${!isMember}">
            <div class="card" style="margin-bottom:12px;background:#fffbeb;border-color:#fef3c7;">
                <div class="section-title">이 모임은 멤버 전용입니다</div>
                <div style="color:#92400e;" th:if="${visibilityType == 'PARTIAL'}">비회원은 향후 일정 일부만 볼 수 있습니다.</div>
                <div style="color:#92400e;" th:if="${visibilityType == 'PRIVATE'}">비회원은 일정 정보를 볼 수 없습니다.</div>
                <div style="color:#92400e;" th:if="${visibilityType == 'PUBLIC'}">비회원도 모든 일정을 볼 수 있습니다.</div>
            </div>
        </div>
		<!--홈탭-->
        <div id="contentHome" class="grid">
            <div>
				<!--모임설명--> 																																		
                <div class="card">
                    <div id="groupDescription" class="description" th:text="${group.description}">모임 설명 영역</div>
					<div><span id="moreBtn" class="more-link" style="display:none;">더보기 ▾</span></div>
                </div>
				<!--임박일정 3개만 표시-->
				<div class="card" style="margin-top:12px;">
                    <div class="section-title">스케줄</div>
                    <div id="recentSchedules" style="color:#64748b;">
                        <div class="muted">로딩 중...</div>
                    </div>
                </div>
            </div>

        </div>
		
		<!--일정탭-->
        <div id="contentSchedule" style="display:none;">
            <div class="card">
				<!-- 우측 상단에 일정 등록 or 신청 버튼 (멤버에게만 표시) -->
                <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                    <button id="globalAddEventBtn" th:if="${canCreateSchedule}" class="px-3 py-1 bg-blue-600 text-white text-sm rounded">일정등록</button>
                </div>
				
			<!-- Calendar will be rendered here; add button handled in renderCalendar() -->                <div id="scheduleFilterBar" th:if="${canManageSchedule}" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><label style="font-size:13px;color:#666;white-space:nowrap;">일정 보기</label><select id="scheduleFilterSelect" onchange="setScheduleFilter(this.value)" style="padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;"><option value="CONFIRMED" selected>🟢 승인</option><option value="PENDING">🟡 대기</option><option value="REJECTED">🔴 거부</option><option value="CANCELLED">⚫ 취소</option><option value="ALL">전체</option></select></div><div class="calendar" id="calendarFull">달력 컴포넌트 자리</div>            </div>        </div>
		
		<!--관리탭-->
        <div id="contentManage" style="display:none;" th:if="${isManager}">
            <div class="card" style="margin-bottom:12px;" th:if="${isLeader}">
                <div class="section-title">가입 요청 관리</div>
                <div class="members-list" id="joinRequestsList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">회원 관리</div>
                <div class="members-list" id="membersList">
                    <!-- Member items will be rendered here -->
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-top:12px;">
                <div class="section-title">일정 관리</div>
                <div class="schedules-list" id="schedulesList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-top:12px;" th:if="${isLeader}">
                <div class="section-title">권한 관리 (리더 전용)</div>
                <div class="permissions-list" id="permissionsList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 공통 모달 (기존 설명/생성 모달을 대체) -->
<div id="commonModal" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" data-size="md">
        <div class="modal-header">
            <h3 id="commonModalTitle">제목</h3>
            <button id="commonModalClose" class="tab" aria-label="닫기">닫기</button>
        </div>
        <div id="commonModalBody" style="margin-top:8px;"></div>
    </div>
</div>

<script>
    // 공통 모달 헬퍼 API (본문 스크롤 잠금 포함)
    (function(){        const overlay = document.getElementById('commonModal');        const modalEl = overlay.querySelector('.modal');        const titleEl = document.getElementById('commonModalTitle');        const bodyEl = document.getElementById('commonModalBody');        const closeBtn = document.getElementById('commonModalClose');        let currentOnClose = null;        let backdropHandler = null;        let prevBodyOverflow = null;        function setSize(size) {            const map = { sm: '420px', md: '720px', lg: '920px', auto: 'auto' };            modalEl.style.width = map[size] || map.md;        }        function lockBody() {            try { prevBodyOverflow = document.body.style.overflow; document.body.style.overflow = 'hidden'; } catch(e) { /* 무시 */ }        }        function unlockBody() {            try { document.body.style.overflow = prevBodyOverflow || ''; prevBodyOverflow = null; } catch(e) { /* 무시 */ }        }        function openCommonModal(options) {            if (!overlay) return;            titleEl.textContent = options.title || '';            bodyEl.innerHTML = '';            if (options.content instanceof Node) bodyEl.appendChild(options.content);            else bodyEl.innerHTML = options.content || '';            setSize(options.size || 'md'); if (closeBtn) closeBtn.style.display = (options.showClose === false) ? 'none' : '';            overlay.style.display = 'flex';            overlay.setAttribute('aria-hidden','false');            lockBody();            currentOnClose = typeof options.onClose === 'function' ? options.onClose : null;            if (backdropHandler) overlay.removeEventListener('click', backdropHandler);            if (options.backdropClose === false) {                backdropHandler = null;            } else {                backdropHandler = function(ev){ if (ev.target === overlay) closeCommonModal(); };                overlay.addEventListener('click', backdropHandler);            }        }        function closeCommonModal() {            if (!overlay) return;            overlay.style.display = 'none';            overlay.setAttribute('aria-hidden','true');            bodyEl.innerHTML = '';            if (backdropHandler) { overlay.removeEventListener('click', backdropHandler); backdropHandler = null; }            if (typeof currentOnClose === 'function') { try { currentOnClose(); } catch(e){ console.warn('modal onClose error', e); } }            currentOnClose = null;            unlockBody();        }        // 닫기 버튼에 동작 연결
        if (closeBtn) closeBtn.addEventListener('click', closeCommonModal);        window.openCommonModal = openCommonModal;        window.closeCommonModal = closeCommonModal;        // 단순 설명용 헬퍼
        window.showDescriptionModal = function(text){            openCommonModal({ title: '모임 설명', content: '<div style="white-space:pre-wrap;">'+(text||'')+'</div>', size: 'lg' });        };    })();</script>

<script th:inline="javascript">
    // 메인 페이지 JS (탭, 달력, API) - 일정 생성 모달은 공통 모달을 사용함
    document.addEventListener('DOMContentLoaded', () => {        const tabHome = document.getElementById('tabHome');        const tabSchedule = document.getElementById('tabSchedule');        const tabManage = document.getElementById('tabManage');        const cHome = document.getElementById('contentHome');        const cSchedule = document.getElementById('contentSchedule');        const cManage = document.getElementById('contentManage');        let groupId = /*[[${group.groupId}]]*/ 0;        let isMember = /*[[${isMember}]]*/ false;        let canCreateSchedule = /*[[${canCreateSchedule}]]*/ false;        let createNeedsApproval = /*[[${createNeedsApproval}]]*/ false;        let canManageSchedule = /*[[${canManageSchedule}]]*/ false;        try {            const container = document.querySelector('.container');            if (container && container.dataset) {                if (container.dataset.groupId) groupId = Number(container.dataset.groupId) || groupId;                if (typeof container.dataset.isMember !== 'undefined') { const v = container.dataset.isMember; if (v === 'true' || v === 'false') isMember = (v === 'true'); else isMember = Boolean(v); }                if (typeof container.dataset.canCreateSchedule !== 'undefined') canCreateSchedule = (container.dataset.canCreateSchedule === 'true');                if (typeof container.dataset.createNeedsApproval !== 'undefined') createNeedsApproval = (container.dataset.createNeedsApproval === 'true');                if (typeof container.dataset.canManageSchedule !== 'undefined') canManageSchedule = (container.dataset.canManageSchedule === 'true');            }        } catch(e) {}        function activateTab(tab) {            [tabHome, tabSchedule, tabManage].forEach(t => { if (t) t.classList.remove('active'); });            [cHome, cSchedule, cManage].forEach(c => { if (c) c.style.display = 'none'; });            tab.classList.add('active');            if (tab === tabHome) cHome.style.display = 'grid';            if (tab === tabSchedule) cSchedule.style.display = 'block';            if (tab === tabManage) cManage.style.display = 'block';        }        if (tabHome) tabHome.addEventListener('click', () => activateTab(tabHome));        if (tabSchedule) tabSchedule.addEventListener('click', () => { activateTab(tabSchedule); loadSchedules(); });        if (tabManage) tabManage.addEventListener('click', () => { activateTab(tabManage); loadMembers(); loadSchedulesForManage(); loadJoinRequests(); });        try { activateTab(tabHome); setTimeout(() => loadSchedules(), 0); } catch(e) { activateTab(tabHome); }        // 설명 '더보기' 처리        (function(){            const descEl = document.getElementById('groupDescription');            const moreBtn = document.getElementById('moreBtn');            if (!descEl || !moreBtn) return;            function needsMore(el){                const clone = el.cloneNode(true);                clone.style.position = 'absolute'; clone.style.visibility='hidden'; clone.style.display='block'; clone.style.webkitLineClamp='none'; clone.style.maxHeight='none'; clone.style.width = el.clientWidth + 'px';                document.body.appendChild(clone);                const fullHeight = clone.scrollHeight; const visibleHeight = el.clientHeight; document.body.removeChild(clone);                return fullHeight > visibleHeight + 2;            }            try { if (needsMore(descEl)) { moreBtn.style.display='inline-block'; moreBtn.addEventListener('click', ()=> window.showDescriptionModal(descEl.textContent)); } } catch(e) {}        })();        // 가입하기 / 취소 (비회원 전용, 탭 우측)
        // 예/아니오 확인 모달 (가입 신청 / 가입 취소 공용). opts.tone: 'info'(파랑) | 'warning'(주황)
        function openYesNoConfirm(message, onYes, opts){
            opts = opts || {};
            const tone = opts.tone === 'warning' ? 'warning' : 'info';
            const icon = tone === 'warning' ? '⚠️' : 'ℹ️';
            const accentColor = tone === 'warning' ? '#d97706' : '#2563eb';
            const confirmLabel = opts.confirmLabel || '예';

            const con = document.createElement('div'); con.style.cssText = 'display:flex;flex-direction:column;gap:14px;';
            const msg = document.createElement('div'); msg.style.cssText = 'font-size:14px;color:#475569;white-space:pre-wrap;line-height:1.5;'; msg.textContent = message;
            con.appendChild(msg);
            const bRow = document.createElement('div'); bRow.style.cssText = 'display:flex;justify-content:flex-end;gap:8px;';
            const noBtn = document.createElement('button'); noBtn.className = 'tab'; noBtn.textContent = '아니오'; noBtn.onclick = () => window.closeCommonModal && window.closeCommonModal();
            const yesBtn = document.createElement('button'); yesBtn.className = 'tab'; yesBtn.style.cssText = 'background:' + accentColor + ';border:1px solid ' + accentColor + ';color:#fff;'; yesBtn.textContent = confirmLabel;
            yesBtn.onclick = () => onYes(yesBtn);
            bRow.appendChild(noBtn); bRow.appendChild(yesBtn); con.appendChild(bRow);
            window.openCommonModal({ title: icon + ' 확인', content: con, size: 'sm', backdropClose: false, showClose: false });
        }
        function renderJoinButton(latestReq){
            const el = document.getElementById('joinAction');
            if (!el) return;
            el.innerHTML = '';
            if (latestReq && latestReq.status === 'PENDING') {
                const wrap = document.createElement('div'); wrap.className = 'join-pending';
                const badge = document.createElement('span'); badge.className = 'join-pending-badge'; badge.style.cursor = 'pointer'; badge.textContent = '가입 신청 중';
                badge.addEventListener('click', () => {
                    openYesNoConfirm('현재 가입신청 진행 중입니다.\n가입신청을 취소하시겠습니까?', async (yesBtn) => {
                        yesBtn.disabled = true;
                        try {
                            const res = await fetch('/groups/' + groupId + '/join-requests/' + latestReq.requestId, { method: 'DELETE', credentials: 'same-origin' });
                            if (!res.ok) throw new Error('취소에 실패했습니다.');
                            window.closeCommonModal && window.closeCommonModal();
                            renderJoinButton(null);
                        } catch (e) {
                            yesBtn.disabled = false;
                            window.openCommonModal({ title: '오류', content: '<div>' + (e.message || '취소에 실패했습니다.') + '</div>', size: 'sm' });
                        }
                    }, { tone: 'warning', confirmLabel: '예(가입취소)' });
                });
                wrap.appendChild(badge);
                el.appendChild(wrap);
            } else {
                const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;align-items:center;gap:8px;';
                if (latestReq && latestReq.status === 'REJECTED') {
                    const rejBadge = document.createElement('span'); rejBadge.className = 'join-pending-badge'; rejBadge.style.cssText = 'cursor:pointer;background:#fee2e2;color:#991b1b;'; rejBadge.textContent = '가입 거부됨';
                    rejBadge.addEventListener('click', () => {
                        window.openCommonModal({ title: '가입 거부 안내', content: '<div style="white-space:pre-wrap;">' + (latestReq.rejectReason || '거부 사유가 등록되지 않았습니다.') + '</div>', size: 'sm' });
                    });
                    wrap.appendChild(rejBadge);
                }
                const joinBtn = document.createElement('button'); joinBtn.className = 'join-btn'; joinBtn.textContent = '가입하기';
                joinBtn.addEventListener('click', () => {
                    openYesNoConfirm('이 모임에 가입 신청하시겠습니까?', async (yesBtn) => {
                        yesBtn.disabled = true;
                        try {
                            const res = await fetch('/groups/' + groupId + '/join-requests', { method: 'POST', credentials: 'same-origin' });
                            const body = await res.json().catch(() => ({}));
                            if (!res.ok) {
                                window.closeCommonModal && window.closeCommonModal();
                                window.openCommonModal({ title: '안내', content: '<div>' + (body.message || '가입 신청에 실패했습니다.') + '</div>', size: 'sm' });
                                return;
                            }
                            window.closeCommonModal && window.closeCommonModal();
                            window.openCommonModal({ title: '완료', content: '<div>가입 신청이 완료되었습니다.</div>', size: 'sm' });
                            renderJoinButton({ requestId: body.requestId, status: 'PENDING' });
                        } catch (e) {
                            yesBtn.disabled = false;
                            window.closeCommonModal && window.closeCommonModal();
                            window.openCommonModal({ title: '오류', content: '<div>가입 신청에 실패했습니다.</div>', size: 'sm' });
                        }
                    }, { tone: 'info', confirmLabel: '예' });
                });
                wrap.appendChild(joinBtn);
                el.appendChild(wrap);
            }
        }
        async function loadJoinStatus(){
            try {
                const res = await fetch('/groups/' + groupId + '/join-requests/me', { credentials: 'same-origin', cache: 'no-store' });
                if (!res.ok) { renderJoinButton(null); return; }
                const list = await res.json();
                const latest = Array.isArray(list) && list.length > 0 ? list[0] : null;
                renderJoinButton(latest);
            } catch (e) { renderJoinButton(null); }
        }

        // 가입 요청 관리 (리더 전용, 관리 탭)
        async function loadJoinRequests(){
            const el = document.getElementById('joinRequestsList');
            if (!el) return;
            el.innerHTML = '<div class="muted">로딩 중...</div>';
            try {
                const res = await fetch('/groups/joins/pending/' + groupId, { credentials: 'same-origin' });
                if (!res.ok) throw new Error('Failed');
                const list = await res.json();
                el.innerHTML = '';
                if (!Array.isArray(list) || list.length === 0) { el.innerHTML = '<div class="muted">대기중인 가입 요청이 없습니다.</div>'; return; }
                list.forEach(req => el.appendChild(renderJoinRequestItem(req)));
            } catch (e) { el.innerHTML = '<div class="muted">가입 요청을 불러오지 못했습니다.</div>'; }
        }
        function renderJoinRequestItem(req){
            const div = document.createElement('div'); div.className = 'member-item';
            const left = document.createElement('div');
            const when = req.requestedAt ? new Date(req.requestedAt).toLocaleString() : '-';
            left.innerHTML = '<div style="font-weight:700">' + ('사용자 #' + req.userKey) + '</div><div class="member-meta">' + when + '</div>';
            const actions = document.createElement('div'); actions.style.display = 'flex'; actions.style.gap = '4px';
            const approveBtn = document.createElement('button'); approveBtn.className = 'tab'; approveBtn.style.background = '#dcfce7'; approveBtn.style.color = '#166534'; approveBtn.textContent = '승인';
            approveBtn.addEventListener('click', () => {
                openYesNoConfirm('이 사용자의 가입 신청을 승인하시겠습니까?', async (yesBtn) => {

// 인원/정원 값에 호버(PC)/탭(모바일) 시 열리는 읽기 전용 명단 팝오버
function attachRosterPopover(triggerEl, anchorEl, scheduleId) {
  let box = null;
  let loaded = false;
  const sL = { PENDING: '대기', CONFIRMED: '확정', REJECTED: '거부', CANCELLED: '취소' };
  const sC = { PENDING: 'background:#fef9c3;color:#854d0e;', CONFIRMED: 'background:#dcfce7;color:#166534;', REJECTED: 'background:#fee2e2;color:#991b1b;', CANCELLED: 'background:#f1f5f9;color:#64748b;' };
  function ensureBox() {
    if (box) return box;
    box = document.createElement('div'); box.className = 'roster-popover'; box.textContent = '불러오는 중...';
    anchorEl.appendChild(box);
    return box;
  }
  async function ensureLoaded() {
    if (loaded) return;
    loaded = true;
    const b = ensureBox();
    try {
      const res = await fetch('/api/groups/' + groupId + '/schedules/' + scheduleId + '/attendance', { credentials: 'same-origin' });
      const list = res.ok ? await res.json() : [];
      const rows = list.filter(a => a.status === 'CONFIRMED' || a.status === 'PENDING');
      b.innerHTML = '';
      if (rows.length === 0) {
        const em = document.createElement('div'); em.style.cssText = 'font-size:12px;color:#94a3b8;'; em.textContent = '참가자가 없습니다.'; b.appendChild(em);
      } else {
        rows.forEach(a => {
          const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;';
          const ns = document.createElement('span'); ns.textContent = a.displayName || '(알 수 없음)';
          const sb = document.createElement('span'); sb.style.cssText = (sC[a.status] || '') + 'padding:1px 6px;border-radius:999px;font-size:11px;'; sb.textContent = sL[a.status] || a.status;
          row.appendChild(ns); row.appendChild(sb); b.appendChild(row);
        });
      }
    } catch (e) {
      loaded = false;
      b.innerHTML = ''; const errEl = document.createElement('div'); errEl.style.cssText = 'font-size:12px;color:#dc2626;'; errEl.textContent = '명단을 불러오지 못했습니다.'; b.appendChild(errEl);
    }
  }
  function show() { ensureBox().style.display = 'block'; ensureLoaded(); }
  function hide() { if (box) box.style.display = 'none'; }
  triggerEl.addEventListener('mouseenter', show);
  triggerEl.addEventListener('mouseleave', hide);
  triggerEl.addEventListener('click', (e) => {
    e.stopPropagation();
    const opening = !box || box.style.display !== 'block';
    if (opening) {
      show();
      document.addEventListener('click', function (ev2) {
        if (box && !box.contains(ev2.target) && ev2.target !== triggerEl) hide();
      }, { once: true });
    } else {
      hide();
    }
  });
}

ocument.createElement('div'); cellHeader.className='flex justify-between items-start'; const dayNum = document.createElement('span'); dayNum.className = `inline-flex items-center justify-center w-7 h-7 text-sm font-semibold rounded-full ${isToday ? 'bg-blue-600 text-white' : ''}`; dayNum.textContent = cellDate.getDate(); cellHeader.appendChild(dayNum);                 cell.appendChild(cellHeader);                const evs = eventsByDate[dateKey] || []; const evContainer = document.createElement('div'); evContainer.className='flex flex-col gap-1 mt-1 overflow-hidden'; evs.slice(0,3).forEach(it=>{ const itEl = document.createElement('div'); const _sc=it.status==='PENDING'?'bg-yellow-50 text-yellow-700 border-yellow-100':it.status==='REJECTED'?'bg-red-50 text-red-600 border-red-100':it.status==='CANCELLED'?'bg-gray-50 text-gray-400 border-gray-200':'bg-blue-50 text-blue-700 border-blue-100'; itEl.className='text-[10px] sm:text-xs p-1 px-1.5 rounded border truncate font-medium '+_sc; itEl.textContent = it.title; itEl.onclick = (e)=>{ e.stopPropagation(); openEventDetail(it); }; evContainer.appendChild(itEl); }); if (evs.length>3){ const more = document.createElement('div'); more.className='text-[10px] text-slate-400 pl-1 font-medium'; more.textContent = `+ ${evs.length-3}개 더보기`; evContainer.appendChild(more); }                cell.appendChild(evContainer);                // 날짜 클릭: 등록 권한 있으면 일정 등록, 없고 이벤트 있으면 일별 보기                cell.onclick = ()=>{ if(canCreateSchedule){ window.openCreateEventModal(cellDate); } else if(evs.length>0){ openDayView(cellDate,evs); } };                grid.appendChild(cell);            }            cal.appendChild(grid);        }        async function loadMembers(){ if (!membersList) return; membersList.innerHTML = '<div class="muted">멤버 목록을 불러오는 중...</div>'; try{ const res = await fetch('/api/groups/'+groupId+'/members'); if(!res.ok) throw new Error('Failed'); const data = await res.json(); membersList.innerHTML=''; if(!Array.isArray(data)||data.length===0){ membersList.innerHTML='<div class="muted">멤버가 없습니다.</div>'; return; } data.forEach(m=> membersList.appendChild(renderMember(m))); }catch(e){ membersList.innerHTML='<div class="muted">멤버를 불러오지 못했습니다.</div>'; } }        function setScheduleFilter(status){  scheduleFilter=status;  const _sel=document.getElementById('scheduleFilterSelect');  if(_sel&&_sel.value!==status)_sel.value=status;  renderCalendar();}async function loadSchedules(){ const cal = document.getElementById('calendarFull'); if (!cal) return; cal.textContent='일정을 불러오는 중...'; calendarEvents = await getSchedules(); renderCalendar(); updateRecentSchedules(); }        async function loadSchedulesForManage(){ const el = document.getElementById('schedulesList'); if(!el) return; el.innerHTML = '<div class="muted">일정 목록을 불러오는 중...</div>'; try{ const data = await getSchedules({ all: true }); el.innerHTML=''; if(!Array.isArray(data)||data.length===0){ el.innerHTML='<div class="muted">일정이 없습니다.</div>'; return; } data.forEach(ev=>{ const item=document.createElement('div'); item.className='member-item'; const sMap={'PENDING':'🟡 승인대기','CONFIRMED':'🟢 승인','REJECTED':'🔴 반려','CANCELLED':'⚫ 취소'}; const left=document.createElement('div'); left.innerHTML='<div style="font-weight:700">'+(ev.title||'일정')+'</div><div class="member-meta">'+new Date(ev.start).toLocaleString()+' &middot; '+(sMap[ev.status]||ev.status||'-')+'</div>'; const btns=document.createElement('div'); btns.style.display='flex'; btns.style.gap='4px'; if(canManageSchedule&&(ev.status==='PENDING'||ev.status==='CONFIRMED')){ const edb=document.createElement('button'); edb.textContent='수정'; edb.className='tab'; edb.style.background='#eff6ff'; edb.style.color='#1d4ed8'; edb.onclick=()=>openEditModal(ev.id); btns.appendChild(edb); } if(canManageSchedule&&ev.status==='PENDING'){ const ab=document.createElement('button'); ab.textContent='승인'; ab.className='tab'; ab.style.background='#dcfce7'; ab.style.color='#166534'; ab.onclick=()=>{performAction(ev.id,'approve',{btnEl:ab,originalText:'승인',successMsg:'일정이 승인되었습니다.'});}; const rb=document.createElement('button'); rb.textContent='반려'; rb.className='tab'; rb.style.background='#fee2e2'; rb.style.color='#991b1b'; rb.onclick=()=>{confirmAndAct(ev.id,'reject',{label:'거부',warningMsg:'이 일정을 거부하시겠습니까? 거부 후에는 되돌릴 수 없습니다.'});}; btns.appendChild(ab); btns.appendChild(rb); } if(canManageSchedule&&(ev.status==='PENDING'||ev.status==='CONFIRMED')){ const cb=document.createElement('button'); cb.textContent='취소'; cb.className='tab'; cb.style.background='#fff1f2'; cb.style.color='#be123c'; cb.onclick=()=>{confirmAndAct(ev.id,'cancel',{label:'취소',warningMsg:'이 일정을 취소하시겠습니까? 취소 후에는 복구할 수 없습니다.'});}; btns.appendChild(cb); } item.appendChild(left); item.appendChild(btns); el.appendChild(item); }); }catch(e){ el.innerHTML = '<div class="muted">일정을 불러오지 못했습니다.</div>'; } }        function renderMember(m){ const div = document.createElement('div'); div.className='member-item'; const left = document.createElement('div'); left.innerHTML = '<div style="font-weight:700">'+(m.displayName||m.userKey)+'</div><div class="member-meta">'+(m.status||'ACTIVE')+' • '+(m.joinedAt?new Date(m.joinedAt).toLocaleString():'-')+'</div>'; const actions = document.createElement('div'); const banBtn = document.createElement('button'); banBtn.textContent='차단(Ban)'; banBtn.className='btn secondary'; banBtn.style.marginLeft='8px'; banBtn.addEventListener('click', async ()=>{            // 모달로 차단 확인을 띄우고, 확인 시 API 호출            const content = document.createElement('div');            const p = document.createElement('div'); p.textContent = '정말 차단하시겠습니까?'; p.style.marginBottom='12px';            const btns = document.createElement('div'); btns.style.display='flex'; btns.style.justifyContent='flex-end'; btns.style.gap='8px';            const ok = document.createElement('button'); ok.textContent='차단'; ok.className='btn danger';            const cancel = document.createElement('button'); cancel.textContent='취소'; cancel.className='tab';            btns.appendChild(cancel); btns.appendChild(ok); content.appendChild(p); content.appendChild(btns);            window.openCommonModal({ title: '멤버 차단', content: content, size: 'sm', backdropClose: false, onClose: null });            cancel.addEventListener('click', ()=> window.closeCommonModal());            ok.addEventListener('click', async ()=>{                try{ const r = await fetch('/api/groups/'+groupId+'/members/'+m.userKey+'/ban', { method:'PATCH' }); if(!r.ok) throw new Error('ban failed'); window.closeCommonModal(); window.openCommonModal({ title:'완료', content:'<div>차단되었습니다.</div>', size:'sm' }); loadMembers(); }catch(ex){ window.openCommonModal({ title:'오류', content:'<div>차단 요청 실패</div>', size:'sm' }); }            });        }); actions.appendChild(banBtn); div.appendChild(left); div.appendChild(actions); return div; }        function openDayView(date, evs){ const dayList = document.getElementById('calendarDayList'); if(!dayList) return; dayList.innerHTML=''; const h = document.createElement('div'); h.textContent = date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate(); h.style.fontWeight='700'; h.style.marginBottom='8px'; dayList.appendChild(h); if(!evs||evs.length===0){ const p = document.createElement('div'); p.textContent='해당일의 일정이 없습니다.'; dayList.appendChild(p); return; } evs.forEach(it=>{ const row = document.createElement('div'); row.style.padding='8px'; row.style.border='1px solid #eee'; row.style.borderRadius='8px'; row.style.marginBottom='6px'; row.textContent = (new Date(it.start)).toLocaleString() + ' — ' + it.title; dayList.appendChild(row); }); }        // 외부에서 사용하는 함수 노출        function openEditModal(scheduleId) {
  const ev = calendarEvents.find(e => e.id == scheduleId);
  if (!ev) return;

  whenRow.appendChild(whenStartLabel);whenRow.appendChild(whenEndLabel);
  // 분 단위 체크박스

  const minuteChk=mk('input',null,{type:'checkbox',id:'editMinuteToggle'});

  // 에러 메시지

  let _errTimer=null;
  const _showErr=msg=>{if(_errTimer){clearTimeout(_errTimer);_errTimer=null;}errorDiv.textContent=msg||'';errorDiv.style.display=msg?'block':'none';if(msg)_errTimer=setTimeout(()=>{errorDiv.style.display='none';_errTimer=null;},5000);};

    try{

    }catch(err){_showErr(err.message||'수정 중 오류가 발생했습니다.');}

}async function scheduleAction(scheduleId,action){ try{ const r=await fetch('/api/groups/'+groupId+'/schedules/'+scheduleId+'/'+action,{method:'PATCH',credentials:'same-origin'}); if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.message||action+' 실패'); } calendarEvents=await fetchSchedulesRaw(); renderCalendar(); loadSchedulesForManage(); }catch(e){ window.openCommonModal({title:'오류',content:'<div>'+e.message+'</div>',size:'sm'}); } }async function performAction(scheduleId,action,opts){ const {reason,btnEl,originalText,successMsg}=opts||{}; if(btnEl){btnEl.disabled=true;btnEl.textContent='처리 중...';} try{ const fo={method:'PATCH',credentials:'same-origin'}; if(reason){fo.headers={'Content-Type':'application/json'};fo.body=JSON.stringify({reason});} const r=await fetch('/api/groups/'+groupId+'/schedules/'+scheduleId+'/'+action,fo); if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.message||action+' 실패');} await getSchedules({ all: true, forceRefresh: true });renderCalendar();updateRecentSchedules();loadSchedulesForManage(); window.closeCommonModal&&window.closeCommonModal(); const sd=document.createElement('div');sd.style.cssText='padding:8px 0;color:#166534;';sd.textContent=successMsg||'처리가 완료되었습니다.'; window.openCommonModal({title:'완료',content:sd,size:'sm'}); }catch(e){ if(btnEl){btnEl.disabled=false;btnEl.textContent=originalText||action;} window.openCommonModal({title:'오류',content:'<div>'+e.message+'</div>',size:'sm'}); } } function confirmAndAct(scheduleId,action,opts){ const {label,warningMsg}=opts||{}; const con=document.createElement('div');con.style.cssText='display:flex;flex-direction:column;gap:12px;'; const warn=document.createElement('div');warn.style.cssText='color:#92400e;background:#fffbeb;border:1px solid #fef3c7;border-radius:6px;padding:10px 12px;font-size:14px;'; warn.textContent=warningMsg||('정말로 이 일정을 '+label+'하시겠습니까?');con.appendChild(warn); const lbl=document.createElement('label');lbl.style.cssText='display:flex;flex-direction:column;gap:4px;font-weight:600;font-size:14px;';lbl.textContent=label+' 사유 *'; const ta=document.createElement('textarea');ta.style.cssText='width:100%;min-height:80px;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-top:4px;resize:vertical;';ta.placeholder=label+' 사유를 입력해주세요 (필수)'; lbl.appendChild(ta);con.appendChild(lbl); const errDiv=document.createElement('div');errDiv.style.cssText='color:#dc2626;font-size:12px;display:none;';con.appendChild(errDiv); const bRow=document.createElement('div');bRow.style.cssText='display:flex;justify-content:flex-end;gap:8px;margin-top:4px;'; const cancelBtn=document.createElement('button');cancelBtn.className='tab';cancelBtn.textContent='닫기';cancelBtn.onclick=()=>{window.closeCommonModal&&window.closeCommonModal();}; const confirmBtn=document.createElement('button');confirmBtn.className='btn';confirmBtn.style.cssText='background:#dc2626;border-color:#dc2626;color:#fff;font-size:13px;';confirmBtn.textContent=label+' 확인'; confirmBtn.onclick=async()=>{ const reason=ta.value.trim(); if(!reason){errDiv.textContent=label+' 사유를 입력해주세요.';errDiv.style.display='block';return;} await performAction(scheduleId,action,{reason,btnEl:confirmBtn,originalText:label+' 확인',successMsg:'일정이 '+label+'되었습니다.'}); }; bRow.appendChild(cancelBtn);bRow.appendChild(confirmBtn);con.appendChild(bRow); window.openCommonModal({title:'일정 '+label,content:con,size:'sm',backdropClose:false}); }        window.fetchSchedulesRaw = fetchSchedulesRaw; window.renderCalendar = renderCalendar; window.setScheduleFilter = setScheduleFilter;        if (!isMember) loadJoinStatus();    });</script>
