<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>그룹 관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Basic layout matching main.html style */
        * { box-sizing: border-box; }
        body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; color:#0f172a; background:linear-gradient(180deg,#f8fafc,#f1f5f9); }
        .container { max-width:980px; margin:24px auto; padding:0 16px; }
        .card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,0.06); border:1px solid rgba(2,6,23,0.04); }
        .section-title { font-weight:700; margin:0 0 12px 0; font-size:1rem; color:#0b1220; display:flex; align-items:center; justify-content:space-between; }
        .tabs { display:flex; gap:8px; margin-bottom:12px; }
        .tab { padding:8px 12px; border-radius:8px; background:#f1f5f9; cursor:pointer; font-weight:700; }
        .tab.active { background:#0f172a; color:#fff; }
        .grid { display:grid; grid-template-columns: 1fr; gap:12px; }
        @media (min-width:900px) { .grid { grid-template-columns: 2fr 1fr; } }

        /* Description truncation to ~7 lines */
        .description { overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; white-space:pre-wrap; }
        .more-link { color:#2563eb; cursor:pointer; text-decoration:underline; margin-top:8px; display:inline-block; }


        /* Management tab styles */
        .members-list, .schedules-list, .permissions-list { border-radius:10px; border:1px solid rgba(2,6,23,0.06); padding:12px; max-height:400px; overflow:auto; }
        .member-item { display:flex; justify-content:space-between; align-items:center; padding:8px; border-radius:8px; background:linear-gradient(180deg,#fff,#fcfeff); margin-bottom:8px; }
        .member-meta { color:#64748b; font-size:0.9rem; }
        .danger { background:#fff1f2; color:#981b1b; border:1px solid #fecaca; }

        /* Modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(2,6,23,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
        .modal { background:#fff; width:720px; max-width:95%; border-radius:10px; padding:18px; box-shadow:0 10px 30px rgba(2,6,23,0.28); }
        .modal .modal-header { display:flex; align-items:center; justify-content:space-between; }

        /* Calendar specific styles */
        #calendarFull { cursor: pointer; }
    </style>
</head>
<body>
<header style="padding:20px 0;">
    <div style="max-width:980px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:16px;">
        <div style="font-weight:700;font-size:1.125rem;">Club Schedule</div>
        <div style="margin-left:auto;"></div>
    </div>
</header>

<div class="container" th:attr="data-group-id=${group.groupId}, data-is-member=${isMember}, data-can-create-schedule=${canCreateSchedule}, data-create-needs-approval=${createNeedsApproval}, data-can-manage-schedule=${canManageSchedule}">
    <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div>
                <div style="font-weight:800; font-size:1.25rem;" th:text="${group.name}">그룹명</div>
<!--                <div style="color:#64748b; margin-top:6px;" class="member-meta">그룹 ID: <span th:text="${group.groupId}">1</span></div>-->
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <a th:href="@{/}" class="tab">목록으로</a>
            </div>
        </div>
    </div>
	
    <div class="card" style="margin-top:12px;">
        <div class="tabs">
            <div id="tabHome" class="tab active">홈</div>
            <div id="tabSchedule" class="tab">일정</div>
            <div id="tabManage" class="tab" th:if="${isManager}">관리</div>
        </div>

        <div th:if="${!isMember}">
            <div class="card" style="margin-bottom:12px;background:#fffbeb;border-color:#fef3c7;">
                <div class="section-title">이 모임은 멤버 전용입니다</div>
                <div style="color:#92400e;">비회원은 일부 정보만 볼 수 있습니다. 참여하려면 가입 또는 신청이 필요합니다.</div>
            </div>
        </div>
		<!--홈탭-->
        <div id="contentHome" class="grid">
            <div>
				<!--모임설명--> 																																		
                <div class="card">
                    <div id="groupDescription" class="description" th:text="${group.description}">모임 설명 영역</div>
					<div><span id="moreBtn" class="more-link" style="display:none;">더보기</span></div>
                </div>
				<!--임박일정 3개만 표시-->
				<div class="card" style="margin-top:12px;">
                    <div class="section-title">스케줄</div>
                    <div id="recentSchedules" style="color:#64748b;">
                        <div class="muted">로딩 중...</div>
                    </div>
                </div>
            </div>

        </div>
		
		<!--일정탭-->
        <div id="contentSchedule" style="display:none;">
            <div class="card">
				<!-- 우측 상단에 일정 등록 or 신청 버튼 (멤버에게만 표시) -->
                <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                    <button id="globalAddEventBtn" th:if="${canCreateSchedule}" class="px-3 py-1 bg-blue-600 text-white text-sm rounded">일정등록</button>
                </div>
				
			<!-- Calendar will be rendered here; add button handled in renderCalendar() -->                <div class="calendar" id="calendarFull">달력 컴포넌트 자리</div>            </div>        </div>
		
		<!--관리탭-->
        <div id="contentManage" style="display:none;" th:if="${isManager}">
            <div class="card">
                <div class="section-title">회원 관리</div>
                <div class="members-list" id="membersList">
                    <!-- Member items will be rendered here -->
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-top:12px;">
                <div class="section-title">일정 관리</div>
                <div class="schedules-list" id="schedulesList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-top:12px;" th:if="${isLeader}">
                <div class="section-title">권한 관리 (리더 전용)</div>
                <div class="permissions-list" id="permissionsList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 공통 모달 (기존 설명/생성 모달을 대체) -->
<div id="commonModal" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" data-size="md">
        <div class="modal-header">
            <h3 id="commonModalTitle">제목</h3>
            <button id="commonModalClose" class="tab" aria-label="닫기">닫기</button>
        </div>
        <div id="commonModalBody" style="margin-top:8px;"></div>
    </div>
</div>

<script>
    // 공통 모달 헬퍼 API (본문 스크롤 잠금 포함)
    (function(){        const overlay = document.getElementById('commonModal');        const modalEl = overlay.querySelector('.modal');        const titleEl = document.getElementById('commonModalTitle');        const bodyEl = document.getElementById('commonModalBody');        const closeBtn = document.getElementById('commonModalClose');        let currentOnClose = null;        let backdropHandler = null;        let prevBodyOverflow = null;        function setSize(size) {            const map = { sm: '420px', md: '720px', lg: '920px', auto: 'auto' };            modalEl.style.width = map[size] || map.md;        }        function lockBody() {            try { prevBodyOverflow = document.body.style.overflow; document.body.style.overflow = 'hidden'; } catch(e) { /* 무시 */ }        }        function unlockBody() {            try { document.body.style.overflow = prevBodyOverflow || ''; prevBodyOverflow = null; } catch(e) { /* 무시 */ }        }        function openCommonModal(options) {            if (!overlay) return;            titleEl.textContent = options.title || '';            bodyEl.innerHTML = '';            if (options.content instanceof Node) bodyEl.appendChild(options.content);            else bodyEl.innerHTML = options.content || '';            setSize(options.size || 'md');            overlay.style.display = 'flex';            overlay.setAttribute('aria-hidden','false');            lockBody();            currentOnClose = typeof options.onClose === 'function' ? options.onClose : null;            if (backdropHandler) overlay.removeEventListener('click', backdropHandler);            if (options.backdropClose === false) {                backdropHandler = null;            } else {                backdropHandler = function(ev){ if (ev.target === overlay) closeCommonModal(); };                overlay.addEventListener('click', backdropHandler);            }        }        function closeCommonModal() {            if (!overlay) return;            overlay.style.display = 'none';            overlay.setAttribute('aria-hidden','true');            bodyEl.innerHTML = '';            if (backdropHandler) { overlay.removeEventListener('click', backdropHandler); backdropHandler = null; }            if (typeof currentOnClose === 'function') { try { currentOnClose(); } catch(e){ console.warn('modal onClose error', e); } }            currentOnClose = null;            unlockBody();        }        // 닫기 버튼에 동작 연결
        if (closeBtn) closeBtn.addEventListener('click', closeCommonModal);        window.openCommonModal = openCommonModal;        window.closeCommonModal = closeCommonModal;        // 단순 설명용 헬퍼
        window.showDescriptionModal = function(text){            openCommonModal({ title: '모임 설명', content: '<div style="white-space:pre-wrap;">'+(text||'')+'</div>', size: 'lg' });        };    })();</script>

<script th:inline="javascript">
    // 메인 페이지 JS (탭, 달력, API) - 일정 생성 모달은 공통 모달을 사용함
    document.addEventListener('DOMContentLoaded', () => {        const tabHome = document.getElementById('tabHome');        const tabSchedule = document.getElementById('tabSchedule');        const tabManage = document.getElementById('tabManage');        const cHome = document.getElementById('contentHome');        const cSchedule = document.getElementById('contentSchedule');        const cManage = document.getElementById('contentManage');        let groupId = /*[[${group.groupId}]]*/ 0;        let isMember = /*[[${isMember}]]*/ false;        let canCreateSchedule = /*[[${canCreateSchedule}]]*/ false;        let createNeedsApproval = /*[[${createNeedsApproval}]]*/ false;        let canManageSchedule = /*[[${canManageSchedule}]]*/ false;        try {            const container = document.querySelector('.container');            if (container && container.dataset) {                if (container.dataset.groupId) groupId = Number(container.dataset.groupId) || groupId;                if (typeof container.dataset.isMember !== 'undefined') { const v = container.dataset.isMember; if (v === 'true' || v === 'false') isMember = (v === 'true'); else isMember = Boolean(v); }                if (typeof container.dataset.canCreateSchedule !== 'undefined') canCreateSchedule = (container.dataset.canCreateSchedule === 'true');                if (typeof container.dataset.createNeedsApproval !== 'undefined') createNeedsApproval = (container.dataset.createNeedsApproval === 'true');                if (typeof container.dataset.canManageSchedule !== 'undefined') canManageSchedule = (container.dataset.canManageSchedule === 'true');            }        } catch(e) {}        function activateTab(tab) {            [tabHome, tabSchedule, tabManage].forEach(t => { if (t) t.classList.remove('active'); });            [cHome, cSchedule, cManage].forEach(c => { if (c) c.style.display = 'none'; });            tab.classList.add('active');            if (tab === tabHome) cHome.style.display = 'grid';            if (tab === tabSchedule) cSchedule.style.display = 'block';            if (tab === tabManage) cManage.style.display = 'block';        }        if (tabHome) tabHome.addEventListener('click', () => activateTab(tabHome));        if (tabSchedule) tabSchedule.addEventListener('click', () => { activateTab(tabSchedule); loadSchedules(); });        if (tabManage) tabManage.addEventListener('click', () => { activateTab(tabManage); loadMembers(); loadSchedulesForManage(); });        try { if (tabSchedule) { activateTab(tabSchedule); loadSchedules(); } else { activateTab(tabHome); } } catch(e) { activateTab(tabHome); }        // 설명 '더보기' 처리        (function(){            const descEl = document.getElementById('groupDescription');            const moreBtn = document.getElementById('moreBtn');            if (!descEl || !moreBtn) return;            function needsMore(el){                const clone = el.cloneNode(true);                clone.style.position = 'absolute'; clone.style.visibility='hidden'; clone.style.display='block'; clone.style.webkitLineClamp='none'; clone.style.maxHeight='none';                document.body.appendChild(clone);                const fullHeight = clone.scrollHeight; const visibleHeight = el.clientHeight; document.body.removeChild(clone);                return fullHeight > visibleHeight + 2;            }            try { if (needsMore(descEl)) { moreBtn.style.display='inline-block'; moreBtn.addEventListener('click', ()=> window.showDescriptionModal(descEl.textContent)); } } catch(e) {}        })();        // 우측 상단 '일정등록' 버튼 클릭 연결(템플릿에서 isMember 조건으로 렌더링됨)        const globalAddBtn = document.getElementById('globalAddEventBtn');        if (globalAddBtn) globalAddBtn.addEventListener('click', () => { window.openCreateEventModal(new Date()); });		            const membersList = document.getElementById('membersList');            const schedulesList = document.getElementById('schedulesList');            const recentEl = document.getElementById('recentSchedules');            const permissionsList = document.getElementById('permissionsList');        let calendarEvents = [];        let calendarMonthStart = (new Date()).setDate(1);        async function fetchSchedulesRaw() {            try {                const res = await fetch('/api/groups/' + groupId + '/schedules');                if (!res.ok) throw new Error('Failed to load schedules');                const data = await res.json();                return (Array.isArray(data) ? data.map(ev => ({ id: ev.id, title: ev.title || '일정', start: (typeof ev.start === 'number') ? ev.start : (ev.start ? Number(ev.start) : null), status: ev.status || null, createdBy: ev.createdBy || null, description: ev.description || '' })) : []);            } catch (e) { console.warn(e); return []; }        }        function startOfMonth(date){ const d = new Date(date); d.setHours(0,0,0,0); d.setDate(1); return d; }        function sameDate(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }        function openEventDetail(ev){            const d = new Date(ev.start);            const content = document.createElement('div');            const pWhen = document.createElement('div'); pWhen.textContent = '일시: ' + d.toLocaleString(); pWhen.style.marginBottom='8px';            const pBy = document.createElement('div'); pBy.textContent = '작성자: ' + (ev.createdBy || '-'); pBy.style.marginBottom='8px';            const pDesc = document.createElement('div'); pDesc.style.whiteSpace='pre-wrap'; pDesc.textContent = ev.description || '';            content.appendChild(pWhen); content.appendChild(pBy); content.appendChild(pDesc);            window.openCommonModal({ title: ev.title || '일정', content: content, size: 'sm' });        }
		// 1. 브라우저 쿠키에서 특정 이름(XSRF-TOKEN)의 값을 꺼내오는 헬퍼 함수
		function getCookie(name) {
		    const value = `; ${document.cookie}`;
		    const parts = value.split(`; ${name}=`);
		    if (parts.length === 2) return parts.pop().split(';').shift();
		    return null;
		}        // 일정 생성 모달 (공통 모달 사용)        window.openCreateEventModal = function(date){            if (!isMember) { showModalError('일정 추가는 그룹 멤버만 가능합니다. 가입 후 이용해주세요.'); return; }            const d = new Date(date); d.setHours(12,0,0,0);            const container = document.createElement('div');            container.style.display='flex'; container.style.flexDirection='column'; container.style.gap='8px';            // 제목            const titleLabel = document.createElement('label'); titleLabel.textContent='제목';            const titleInput = document.createElement('input'); titleInput.type='text'; titleInput.style.width='100%'; titleInput.style.padding='8px'; titleInput.style.border='1px solid #ddd'; titleInput.style.borderRadius='6px'; titleInput.placeholder = '일정 제목'; titleLabel.appendChild(titleInput);            // 내용(설명)            const contentLabel = document.createElement('label'); contentLabel.textContent='내용';            const contentInput = document.createElement('textarea'); contentInput.style.width='100%'; contentInput.style.minHeight='100px'; contentInput.style.padding='8px'; contentInput.style.border='1px solid #ddd'; contentInput.style.borderRadius='6px'; contentInput.placeholder = '세부 내용(선택)'; contentLabel.appendChild(contentInput);            // 장소            const locLabel = document.createElement('label'); locLabel.textContent='장소';            const locInput = document.createElement('input'); locInput.type='text'; locInput.style.width='100%'; locInput.style.padding='8px'; locInput.style.border='1px solid #ddd'; locInput.style.borderRadius='6px'; locInput.placeholder = '장소명(예: 강남역 스터디룸)'; locLabel.appendChild(locInput);            // 시작/종료            const whenRow = document.createElement('div'); whenRow.style.display='grid'; whenRow.style.gridTemplateColumns='1fr 1fr'; whenRow.style.gap='8px';            const whenStartLabel = document.createElement('label'); whenStartLabel.textContent='시작 시간';            const startInput = document.createElement('input'); startInput.type='datetime-local'; startInput.style.width='100%'; startInput.style.padding='8px'; startInput.style.border='1px solid #ddd'; startInput.style.borderRadius='6px'; startInput.value = new Date(d).toISOString().substring(0,16); whenStartLabel.appendChild(startInput);            const whenEndLabel = document.createElement('label'); whenEndLabel.textContent='종료 시간';            const endInput = document.createElement('input'); endInput.type='datetime-local'; endInput.style.width='100%'; endInput.style.padding='8px'; endInput.style.border='1px solid #ddd'; endInput.style.borderRadius='6px'; whenEndLabel.appendChild(endInput);            whenRow.appendChild(whenStartLabel); whenRow.appendChild(whenEndLabel);            // 인원 제한: 체크박스로 활성화하고 숫자 입력은 체크된 경우만 사용            const limitRow = document.createElement('div');            limitRow.style.display = 'flex';            limitRow.style.alignItems = 'center';            limitRow.style.gap = '8px';            const limitCheckbox = document.createElement('input');            limitCheckbox.type = 'checkbox';            limitCheckbox.id = 'maxToggle';            const limitText = document.createElement('label');            limitText.htmlFor = 'maxToggle';            limitText.textContent = '인원 제한 적용';            const maxInput = document.createElement('input');            maxInput.type = 'number'; maxInput.min = '0';            maxInput.style.width = '150px'; maxInput.style.padding = '8px'; maxInput.style.border = '1px solid #ddd'; maxInput.style.borderRadius = '6px';            maxInput.value = '0';            maxInput.disabled = true; // 기본 비활성화            // 체크박스 토글로 숫자 입력 활성화/비활성화            limitCheckbox.addEventListener('change', () => { maxInput.disabled = !limitCheckbox.checked; if (!limitCheckbox.checked) maxInput.value = '0'; });            limitRow.appendChild(limitCheckbox);            limitRow.appendChild(limitText);            limitRow.appendChild(maxInput);
						const errorDiv = document.createElement('div');
			    errorDiv.id = 'modal-error-msg';
			    errorDiv.style.color = '#dc3545';       // 부트스트랩 스타일의 경고 빨간색
			    errorDiv.style.backgroundColor = '#f8d7da'; // 연한 빨간색 배경
			    errorDiv.style.border = '1px solid #f5c6cb';
			    errorDiv.style.borderRadius = '6px';
			    errorDiv.style.padding = '10px 12px';
			    errorDiv.style.fontSize = '14px';
			    errorDiv.style.display = 'none';        // 초기에는 숨김 처리

			    // 에러를 화면에 띄워주는 내부 헬퍼 함수 (자동 사라짐 처리 포함)
			    let _modalErrorTimer = null; // 타이머 id 저장 (per-modal)
			    const showModalError = (message) => {
			        try {
			            if (!errorDiv) return;
			            // 항상 이전 타이머 제거하여 연타/연속 오류 시 타이머가 꼬이지 않게 함
			            if (_modalErrorTimer) { clearTimeout(_modalErrorTimer); _modalErrorTimer = null; }

			            errorDiv.textContent = message || '';
			            errorDiv.style.display = message ? 'block' : 'none';

			            // 메시지가 비어있지 않으면 5초 후 자동으로 숨김
			            if (message) {
			                _modalErrorTimer = setTimeout(() => {
			                    try { errorDiv.textContent = ''; errorDiv.style.display = 'none'; } catch(e){}
			                    _modalErrorTimer = null;
			                }, 5000);
			            }
			        } catch (e) { console.warn('showModalError error', e); }
			    };
			    
			// 액션 버튼            const actions = document.createElement('div'); actions.style.display='flex'; actions.style.justifyContent='flex-end'; actions.style.gap='8px';            const saveBtn = document.createElement('button'); saveBtn.textContent='저장'; saveBtn.className='btn';			actions.appendChild(saveBtn);            // 조립            container.appendChild(titleLabel);            container.appendChild(contentLabel);            container.appendChild(locLabel);            container.appendChild(whenRow);            container.appendChild(limitRow);                if(createNeedsApproval){ const an=document.createElement('div'); an.style.padding='8px 10px'; an.style.background='#fffbeb'; an.style.border='1px solid #fef3c7'; an.style.borderRadius='6px'; an.style.color='#92400e'; an.style.fontSize='13px'; an.textContent='이 그룹에서는 일정 등록 후 관리자 승인이 필요합니다.'; container.appendChild(an); }
			container.appendChild(actions);
			container.appendChild(errorDiv);
             window.openCommonModal({ title: '일정 등록', content: container, size: 'md', backdropClose: false, onClose: null });
 
            saveBtn.addEventListener('click', async ()=>{
                const title = (titleInput.value||'').trim();
                const content = (contentInput.value||'').trim();
                const locationName = (locInput.value||'').trim();
                const whenStart = startInput.value; // yyyy-MM-ddTHH:mm
                const whenEnd = endInput.value;
                const maxVal = (typeof limitCheckbox !== 'undefined' && limitCheckbox.checked) ? (Number(maxInput.value) || 0) : 0;
                if (!title || !whenStart) { showModalError('제목과 시작 시간을 입력하세요.'); return; }
                const startEpoch = Date.parse(whenStart);
                 // 종료시간이 지정되지 않았다면 시작시간 + 1시간을 기본으로 사용
                 const endEpoch = whenEnd ? Date.parse(whenEnd) : (startEpoch + 60 * 60 * 1000);

                // 종료가 시작 이전이면 에러
                if (endEpoch <= startEpoch) { showModalError('종료시간은 시작시간보다 이후여야 합니다.'); return; }
                const payload = {
                    title: title,
                    content: content || null,
                    location_name: locationName || null,
                    start: startEpoch, // 기존 호환용 epoch ms
                    start_at: new Date(startEpoch).toISOString(),
                    end_at: endEpoch ? new Date(endEpoch).toISOString() : null,
                    max_attendance: maxVal
                };
                try{
                    const res = await fetch('/api/groups/' + groupId + '/schedules', { 
						method:'POST', 
						credentials: 'same-origin',// 쿠키 전송
						headers:{'Content-Type':'application/json'}, 
						body: JSON.stringify(payload) 
					});
                    if (!res.ok){
                        if (res.status===401) { showModalError('로그인이 필요합니다.'); return; }
                        const text = await res.text().catch(()=>null);
                        throw new Error('생성 실패' + (text ? (': ' + text) : ''));
                    }
                    await res.json();
                    calendarEvents = await fetchSchedulesRaw(); renderCalendar(); updateRecentSchedules(); window.closeCommonModal(); window.openCommonModal({ title:'완료', content:'<div>일정이 추가되었습니다.</div>', size:'sm' });
                } catch(err) { console.error(err); window.openCommonModal({ title:'오류', content:'<div>일정 추가에 실패했습니다.</div>', size:'sm' }); }
             });
         };        // 최근 일정 목록 갱신        function updateRecentSchedules(){            if (!recentEl) return; recentEl.innerHTML = '';            const now = Date.now();            const upcoming = (calendarEvents || []).filter(ev => ev.start && ev.start >= now).sort((a,b)=>a.start-b.start).slice(0,3);            if (upcoming.length === 0){ recentEl.innerHTML = '<div class="muted">임박한 일정이 없습니다.</div>'; return; }            upcoming.forEach(ev=>{                const row = document.createElement('div'); row.style.padding='8px'; row.style.borderBottom='1px solid #f0f0f0'; row.style.cursor='pointer';                const when = new Date(ev.start).toLocaleString(); row.innerHTML = '<div style="font-weight:700">'+(ev.title||'일정')+'</div><div style="color:#64748b">'+when+'</div>';                row.addEventListener('click', ()=> openEventDetail(ev));                recentEl.appendChild(row);            });        }        // 달력 렌더링        function renderCalendar(){            const cal = document.getElementById('calendarFull'); if (!cal) return; cal.innerHTML='';            const monthStart = startOfMonth(calendarMonthStart); const month = monthStart.getMonth(); const year = monthStart.getFullYear();            const header = document.createElement('div'); header.className='flex justify-center items-center mb-6 px-2'; header.innerHTML = `                <button id="prevBtn" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-600">◀</button>                <h2 class="text-xl font-bold text-slate-800">${year}년 ${month+1}월</h2>                <button id="nextBtn" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-600">▶</button>            `; cal.appendChild(header);            header.querySelector('#prevBtn').onclick = ()=>{ calendarMonthStart = new Date(year, month-1, 1); renderCalendar(); };            header.querySelector('#nextBtn').onclick = ()=>{ calendarMonthStart = new Date(year, month+1, 1); renderCalendar(); };            const grid = document.createElement('div'); grid.className='grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-xl overflow-hidden shadow-sm';            const weekdays = ['일','월','화','수','목','금','토']; weekdays.forEach((w,i)=>{ const wEl = document.createElement('div'); wEl.className = `bg-slate-50 py-3 text-center text-xs font-bold uppercase tracking-wider ${i===0? 'text-red-500': i===6? 'text-blue-500':'text-slate-500'}`; wEl.textContent = w; grid.appendChild(wEl); });            const firstDayWeek = monthStart.getDay(); const startDate = new Date(monthStart); startDate.setDate(startDate.getDate() - firstDayWeek);            const eventsByDate = {}; (calendarEvents||[]).forEach(ev=>{ if (!ev.start) return; const d=new Date(ev.start); const key=d.toISOString().split('T')[0]; if (!eventsByDate[key]) eventsByDate[key]=[]; eventsByDate[key].push(ev); });            const todayStr = new Date().toISOString().split('T')[0];            for (let i=0;i<42;i++){ const cellDate = new Date(startDate); cellDate.setDate(cellDate.getDate()+i); const dateKey = cellDate.toISOString().split('T')[0]; const isCurrentMonth = cellDate.getMonth()===month; const isToday = dateKey===todayStr; const cell = document.createElement('div'); cell.className = `min-height-[110px] p-2 bg-white flex flex-col gap-1 transition-colors hover:bg-slate-50 cursor-pointer ${!isCurrentMonth? 'bg-slate-50/50 text-slate-300':'text-slate-700'}`; const cellHeader = document.createElement('div'); cellHeader.className='flex justify-between items-start'; const dayNum = document.createElement('span'); dayNum.className = `inline-flex items-center justify-center w-7 h-7 text-sm font-semibold rounded-full ${isToday ? 'bg-blue-600 text-white' : ''}`; dayNum.textContent = cellDate.getDate(); cellHeader.appendChild(dayNum);                 cell.appendChild(cellHeader);                const evs = eventsByDate[dateKey] || []; const evContainer = document.createElement('div'); evContainer.className='flex flex-col gap-1 mt-1 overflow-hidden'; evs.slice(0,3).forEach(it=>{ const itEl = document.createElement('div'); itEl.className='text-[10px] sm:text-xs p-1 px-1.5 bg-blue-50 text-blue-700 rounded border border-blue-100 truncate font-medium'; itEl.textContent = it.title; itEl.onclick = (e)=>{ e.stopPropagation(); openEventDetail(it); }; evContainer.appendChild(itEl); }); if (evs.length>3){ const more = document.createElement('div'); more.className='text-[10px] text-slate-400 pl-1 font-medium'; more.textContent = `+ ${evs.length-3}개 더보기`; evContainer.appendChild(more); }                cell.appendChild(evContainer);                // 날짜 클릭 기본 동작: Shift 누르면 일정 생성, 아니면 일별 보기                cell.onclick = (e)=>{ if (e.shiftKey){ window.openCreateEventModal(cellDate); } else { openDayView(cellDate, evs); } };                grid.appendChild(cell);            }            cal.appendChild(grid);        }        async function loadMembers(){ if (!membersList) return; membersList.innerHTML = '<div class="muted">멤버 목록을 불러오는 중...</div>'; try{ const res = await fetch('/api/groups/'+groupId+'/members'); if(!res.ok) throw new Error('Failed'); const data = await res.json(); membersList.innerHTML=''; if(!Array.isArray(data)||data.length===0){ membersList.innerHTML='<div class="muted">멤버가 없습니다.</div>'; return; } data.forEach(m=> membersList.appendChild(renderMember(m))); }catch(e){ membersList.innerHTML='<div class="muted">멤버를 불러오지 못했습니다.</div>'; } }        async function loadSchedules(){ const cal = document.getElementById('calendarFull'); if (!cal) return; cal.textContent='일정을 불러오는 중...'; calendarEvents = await fetchSchedulesRaw(); renderCalendar(); updateRecentSchedules(); }        async function loadSchedulesForManage(){ const el = document.getElementById('schedulesList'); if(!el) return; el.innerHTML = '<div class="muted">일정 목록을 불러오는 중...</div>'; try{ const data = await fetchSchedulesRaw(); el.innerHTML=''; if(!Array.isArray(data)||data.length===0){ el.innerHTML='<div class="muted">일정이 없습니다.</div>'; return; } data.forEach(ev=>{ const item=document.createElement('div'); item.className='member-item'; const sMap={'PENDING':'🟡 승인대기','CONFIRMED':'🟢 확정','REJECTED':'🔴 반려','CANCELLED':'⚫ 취소'}; const left=document.createElement('div'); left.innerHTML='<div style="font-weight:700">'+(ev.title||'일정')+'</div><div class="member-meta">'+new Date(ev.start).toLocaleString()+' &middot; '+(sMap[ev.status]||ev.status||'-')+'</div>'; const btns=document.createElement('div'); btns.style.display='flex'; btns.style.gap='4px'; if(canManageSchedule&&ev.status==='PENDING'){ const ab=document.createElement('button'); ab.textContent='승인'; ab.className='tab'; ab.style.background='#dcfce7'; ab.style.color='#166534'; ab.onclick=()=>scheduleAction(ev.id,'approve'); const rb=document.createElement('button'); rb.textContent='반려'; rb.className='tab'; rb.style.background='#fee2e2'; rb.style.color='#991b1b'; rb.onclick=()=>scheduleAction(ev.id,'reject'); btns.appendChild(ab); btns.appendChild(rb); } if(canManageSchedule&&(ev.status==='PENDING'||ev.status==='CONFIRMED')){ const cb=document.createElement('button'); cb.textContent='취소'; cb.className='tab'; cb.style.background='#fff1f2'; cb.style.color='#be123c'; cb.onclick=()=>scheduleAction(ev.id,'cancel'); btns.appendChild(cb); } item.appendChild(left); item.appendChild(btns); el.appendChild(item); }); }catch(e){ el.innerHTML = '<div class="muted">일정을 불러오지 못했습니다.</div>'; } }        function renderMember(m){ const div = document.createElement('div'); div.className='member-item'; const left = document.createElement('div'); left.innerHTML = '<div style="font-weight:700">'+(m.displayName||m.userKey)+'</div><div class="member-meta">'+(m.status||'ACTIVE')+' • '+(m.joinedAt?new Date(m.joinedAt).toLocaleString():'-')+'</div>'; const actions = document.createElement('div'); const banBtn = document.createElement('button'); banBtn.textContent='차단(Ban)'; banBtn.className='btn secondary'; banBtn.style.marginLeft='8px'; banBtn.addEventListener('click', async ()=>{            // 모달로 차단 확인을 띄우고, 확인 시 API 호출            const content = document.createElement('div');            const p = document.createElement('div'); p.textContent = '정말 차단하시겠습니까?'; p.style.marginBottom='12px';            const btns = document.createElement('div'); btns.style.display='flex'; btns.style.justifyContent='flex-end'; btns.style.gap='8px';            const ok = document.createElement('button'); ok.textContent='차단'; ok.className='btn danger';            const cancel = document.createElement('button'); cancel.textContent='취소'; cancel.className='tab';            btns.appendChild(cancel); btns.appendChild(ok); content.appendChild(p); content.appendChild(btns);            window.openCommonModal({ title: '멤버 차단', content: content, size: 'sm', backdropClose: false, onClose: null });            cancel.addEventListener('click', ()=> window.closeCommonModal());            ok.addEventListener('click', async ()=>{                try{ const r = await fetch('/api/groups/'+groupId+'/members/'+m.userKey+'/ban', { method:'PATCH' }); if(!r.ok) throw new Error('ban failed'); window.closeCommonModal(); window.openCommonModal({ title:'완료', content:'<div>차단되었습니다.</div>', size:'sm' }); loadMembers(); }catch(ex){ window.openCommonModal({ title:'오류', content:'<div>차단 요청 실패</div>', size:'sm' }); }            });        }); actions.appendChild(banBtn); div.appendChild(left); div.appendChild(actions); return div; }        function openDayView(date, evs){ const dayList = document.getElementById('calendarDayList'); if(!dayList) return; dayList.innerHTML=''; const h = document.createElement('div'); h.textContent = date.getFullYear()+'-'+(date.getMonth()+1)+'-'+date.getDate(); h.style.fontWeight='700'; h.style.marginBottom='8px'; dayList.appendChild(h); if(!evs||evs.length===0){ const p = document.createElement('div'); p.textContent='해당일의 일정이 없습니다.'; dayList.appendChild(p); return; } evs.forEach(it=>{ const row = document.createElement('div'); row.style.padding='8px'; row.style.border='1px solid #eee'; row.style.borderRadius='8px'; row.style.marginBottom='6px'; row.textContent = (new Date(it.start)).toLocaleString() + ' — ' + it.title; dayList.appendChild(row); }); }        // 외부에서 사용하는 함수 노출        async function scheduleAction(scheduleId,action){ try{ const r=await fetch('/api/groups/'+groupId+'/schedules/'+scheduleId+'/'+action,{method:'PATCH',credentials:'same-origin'}); if(!r.ok){ const j=await r.json().catch(()=>({})); throw new Error(j.message||action+' 실패'); } calendarEvents=await fetchSchedulesRaw(); renderCalendar(); loadSchedulesForManage(); }catch(e){ window.openCommonModal({title:'오류',content:'<div>'+e.message+'</div>',size:'sm'}); } }        window.fetchSchedulesRaw = fetchSchedulesRaw; window.renderCalendar = renderCalendar;    });</script>
