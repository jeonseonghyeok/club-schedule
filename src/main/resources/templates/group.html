<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>그룹 관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
	<script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Basic layout matching main.html style */
        * { box-sizing: border-box; }
        body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; color:#0f172a; background:linear-gradient(180deg,#f8fafc,#f1f5f9); }
        .container { max-width:980px; margin:24px auto; padding:0 16px; }
        .card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 8px 24px rgba(15,23,42,0.06); border:1px solid rgba(2,6,23,0.04); }
        .section-title { font-weight:700; margin:0 0 12px 0; font-size:1rem; color:#0b1220; display:flex; align-items:center; justify-content:space-between; }
        .tabs { display:flex; gap:8px; margin-bottom:12px; }
        .tab { padding:8px 12px; border-radius:8px; background:#f1f5f9; cursor:pointer; font-weight:700; }
        .tab.active { background:#0f172a; color:#fff; }
        .grid { display:grid; grid-template-columns: 1fr; gap:12px; }
        @media (min-width:900px) { .grid { grid-template-columns: 2fr 1fr; } }

        /* Description truncation to ~7 lines */
        .description { overflow:hidden; display:-webkit-box; -webkit-line-clamp:7; -webkit-box-orient:vertical; white-space:pre-wrap; }
        .more-link { display:inline-flex; align-items:center; gap:4px; margin-top:8px; padding:4px 12px; border-radius:999px; background:#eff6ff; color:#2563eb; font-size:13px; font-weight:600; cursor:pointer; border:1px solid #dbeafe; transition:background .15s; }
        .more-link:hover { background:#dbeafe; }
        .join-btn { padding:8px 16px; border-radius:8px; background:#2563eb; color:#fff; font-weight:700; cursor:pointer; border:none; font-size:14px; }
        .join-btn:hover { background:#1d4ed8; }
        .join-btn:disabled { background:#94a3b8; cursor:default; }
        .join-pending { display:flex; align-items:center; gap:8px; }
        .join-pending-badge { padding:6px 12px; border-radius:999px; background:#fef9c3; color:#854d0e; font-size:13px; font-weight:600; }


        /* Management tab styles */
        .members-list, .schedules-list, .permissions-list { border-radius:10px; border:1px solid rgba(2,6,23,0.06); padding:12px; max-height:400px; overflow:auto; }
        .member-item { display:flex; justify-content:space-between; align-items:center; padding:8px; border-radius:8px; background:linear-gradient(180deg,#fff,#fcfeff); margin-bottom:8px; }
        .member-meta { color:#64748b; font-size:0.9rem; }
        .danger { background:#fff1f2; color:#981b1b; border:1px solid #fecaca; }

        /* Modal */
        .modal-overlay { position:fixed; inset:0; background:rgba(2,6,23,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
        .modal { background:#fff; width:720px; max-width:95%; border-radius:10px; padding:18px; box-shadow:0 10px 30px rgba(2,6,23,0.28); }
        .modal .modal-header { display:flex; align-items:center; justify-content:space-between; }

        /* Calendar specific styles */
        #calendarFull { cursor: pointer; }

        /* 일정 상세 모달: 옵션(⋯) 드롭다운 */
        .opt-menu { display:none; position:absolute; right:0; bottom:100%; margin-bottom:6px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 20px rgba(2,6,23,0.12); min-width:120px; z-index:20; overflow:hidden; }
        .opt-menu-item { padding:8px 14px; font-size:13px; color:#1e293b; cursor:pointer; white-space:nowrap; }
        .opt-menu-item:hover { background:#f1f5f9; }

        /* 일정 상세 모달: 인원/정원 호버·탭 명단 팝오버 */
        .roster-popover { display:none; position:absolute; left:0; top:100%; margin-top:6px; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 8px 20px rgba(2,6,23,0.12); padding:8px 10px; min-width:160px; max-height:220px; overflow:auto; z-index:20; }
    </style>
</head>
<body>
<header style="padding:20px 0;">
    <div style="max-width:980px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:16px;">
        <div style="font-weight:700;font-size:1.125rem;">Club Schedule</div>
        <div style="margin-left:auto;"><span th:replace="~{fragments :: notifBell}"></span></div>
    </div>
</header>
<script th:src="@{/js/notifications.js}"></script>

<div class="container" th:attr="data-group-id=${group.groupId}, data-is-member=${isMember}, data-can-create-schedule=${canCreateSchedule}, data-create-needs-approval=${createNeedsApproval}, data-can-manage-schedule=${canManageSchedule}, data-current-user-key=${currentUserKey}">
    <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
            <div>
                <div style="font-weight:800; font-size:1.25rem;" th:text="${group.name}">그룹명</div>
<!--                <div style="color:#64748b; margin-top:6px;" class="member-meta">그룹 ID: <span th:text="${group.groupId}">1</span></div>-->
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <a th:href="@{/(list=1)}" class="tab">목록으로</a>
            </div>
        </div>
    </div>
	
    <div class="card" style="margin-top:12px;">
        <div class="tabs" style="justify-content:space-between;">
            <div style="display:flex;gap:8px;">
                <div id="tabHome" class="tab active">홈</div>
                <div id="tabSchedule" class="tab">일정</div>
                <div id="tabManage" class="tab" th:if="${isManager}">관리</div>
            </div>
            <div id="joinAction" th:if="${!isMember}"></div>
            <button id="favoriteBtn" type="button" th:if="${isMember}"
                    th:attr="data-favorite=${isFavoriteGroup},data-has-favorite=${hasFavoriteGroup}"
                    title="우선모임"
                    style="background:none;border:none;font-size:22px;line-height:1;cursor:pointer;padding:4px 8px;color:#f59e0b;">
                <span th:text="${isFavoriteGroup} ? '★' : '☆'">☆</span>
            </button>
        </div>

        <div th:if="${!isMember}">
            <div class="card" style="margin-bottom:12px;background:#fffbeb;border-color:#fef3c7;">
                <div class="section-title">이 모임은 멤버 전용입니다</div>
                <div style="color:#92400e;" th:if="${visibilityType == 'PARTIAL'}">비회원은 향후 일정 일부만 볼 수 있습니다.</div>
                <div style="color:#92400e;" th:if="${visibilityType == 'PRIVATE'}">비회원은 일정 정보를 볼 수 없습니다.</div>
                <div style="color:#92400e;" th:if="${visibilityType == 'PUBLIC'}">비회원도 모든 일정을 볼 수 있습니다.</div>
            </div>
        </div>
		<!--홈탭-->
        <div id="contentHome" class="grid">
            <div>
				<!--모임설명--> 																																		
                <div class="card">
                    <div id="groupDescription" class="description" th:text="${group.description}">모임 설명 영역</div>
					<div><span id="moreBtn" class="more-link" style="display:none;">더보기 ▾</span></div>
                </div>
				<!--임박일정 3개만 표시-->
				<div class="card" style="margin-top:12px;">
                    <div class="section-title">스케줄</div>
                    <div id="recentSchedules" style="color:#64748b;">
                        <div class="muted">로딩 중...</div>
                    </div>
                </div>
            </div>

        </div>
		
		<!--일정탭-->
        <div id="contentSchedule" style="display:none;">
            <div class="card">
				<!-- 우측 상단에 일정 등록 or 신청 버튼 (멤버에게만 표시) -->
                <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
                    <button id="globalAddEventBtn" th:if="${canCreateSchedule}" class="px-3 py-1 bg-blue-600 text-white text-sm rounded">일정등록</button>
                </div>
				
			<!-- Calendar will be rendered here; add button handled in renderCalendar() -->
                <div id="scheduleFilterBar" th:if="${canManageSchedule}" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><label style="font-size:13px;color:#666;white-space:nowrap;">일정 보기</label><select id="scheduleFilterSelect" onchange="setScheduleFilter(this.value)" style="padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px;"><option value="CONFIRMED" selected>🟢 승인</option><option value="PENDING">🟡 대기</option><option value="REJECTED">🔴 거부</option><option value="CANCELLED">⚫ 취소</option><option value="ALL">전체</option></select></div><div class="calendar" id="calendarFull">달력 컴포넌트 자리</div>
            </div>
        </div>
		
		<!--관리탭-->
        <div id="contentManage" style="display:none;" th:if="${isManager}">
            <!-- 상단: 처리가 필요한 승인 대기 건만 모아 보여주는 위젯 2개 -->
            <div class="card" style="margin-bottom:12px;" th:if="${isLeader}">
                <div class="section-title">가입 요청</div>
                <div class="members-list" id="joinRequestsList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-bottom:12px;">
                <div class="section-title">일정 승인요청</div>
                <div class="members-list" id="pendingScheduleList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">회원 관리</div>
                <div style="display:flex;gap:8px;margin-bottom:12px;">
                    <button type="button" id="memTabActive" class="tab active">일반회원</button>
                    <button type="button" id="memTabWithdrawn" class="tab">탈퇴회원</button>
                    <button type="button" id="memTabKicked" class="tab">내보내기</button>
                </div>
                <div class="members-list" id="membersManageList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-top:12px;">
                <div class="section-title">일정 관리</div>
                <div class="schedules-list" id="schedulesList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>

            <div class="card" style="margin-top:12px;" th:if="${isLeader}">
                <div class="section-title">권한 관리 (리더 전용)</div>
                <div class="permissions-list" id="permissionsList">
                    <div class="muted">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 공통 모달 (기존 설명/생성 모달을 대체) -->
<div id="commonModal" class="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" data-size="md">
        <div class="modal-header">
            <h3 id="commonModalTitle">제목</h3>
            <button id="commonModalClose" class="tab" aria-label="닫기">닫기</button>
        </div>
        <div id="commonModalBody" style="margin-top:8px;"></div>
    </div>
</div>

<script>
    // 공통 모달 헬퍼 API (본문 스크롤 잠금 포함)
    (function(){
        const overlay = document.getElementById('commonModal');
        const modalEl = overlay.querySelector('.modal');
        const titleEl = document.getElementById('commonModalTitle');
        const bodyEl = document.getElementById('commonModalBody');
        const closeBtn = document.getElementById('commonModalClose');
        let currentOnClose = null;
        let backdropHandler = null;
        let prevBodyOverflow = null;

        function setSize(size) {
            const map = { sm: '420px', md: '720px', lg: '920px', auto: 'auto' };
            modalEl.style.width = map[size] || map.md;
        }

        function lockBody() {
            try { prevBodyOverflow = document.body.style.overflow; document.body.style.overflow = 'hidden'; } catch(e) { /* 무시 */ }
        }
        function unlockBody() {
            try { document.body.style.overflow = prevBodyOverflow || ''; prevBodyOverflow = null; } catch(e) { /* 무시 */ }
        }

        function openCommonModal(options) {
            if (!overlay) return;
            titleEl.textContent = options.title || '';
            bodyEl.innerHTML = '';
            if (options.content instanceof Node) bodyEl.appendChild(options.content);
            else bodyEl.innerHTML = options.content || '';
            setSize(options.size || 'md'); if (closeBtn) closeBtn.style.display = (options.showClose === false) ? 'none' : '';
            overlay.style.display = 'flex';
            overlay.setAttribute('aria-hidden','false');
            lockBody();
            currentOnClose = typeof options.onClose === 'function' ? options.onClose : null;

            if (backdropHandler) overlay.removeEventListener('click', backdropHandler);
            if (options.backdropClose === false) {
                backdropHandler = null;
            } else {
                backdropHandler = function(ev){ if (ev.target === overlay) closeCommonModal(); };
                overlay.addEventListener('click', backdropHandler);
            }
        }
        function closeCommonModal() {
            if (!overlay) return;
            overlay.style.display = 'none';
            overlay.setAttribute('aria-hidden','true');
            bodyEl.innerHTML = '';
            if (backdropHandler) { overlay.removeEventListener('click', backdropHandler); backdropHandler = null; }
            if (typeof currentOnClose === 'function') { try { currentOnClose(); } catch(e){ console.warn('modal onClose error', e); } }
            currentOnClose = null;
            unlockBody();
        }

        // 닫기 버튼에 동작 연결
        if (closeBtn) closeBtn.addEventListener('click', closeCommonModal);

        window.openCommonModal = openCommonModal;
        window.closeCommonModal = closeCommonModal;

        // 단순 설명용 헬퍼
        window.showDescriptionModal = function(text){
            openCommonModal({ title: '모임 설명', content: '<div style="white-space:pre-wrap;">'+(text||'')+'</div>', size: 'lg' });
        };

    })();
</script>

<script th:inline="javascript">
    // 메인 페이지 JS (탭, 달력, API) - 일정 생성 모달은 공통 모달을 사용함
    document.addEventListener('DOMContentLoaded', () => {
        const tabHome = document.getElementById('tabHome');
        const tabSchedule = document.getElementById('tabSchedule');
        const tabManage = document.getElementById('tabManage');
        const cHome = document.getElementById('contentHome');
        const cSchedule = document.getElementById('contentSchedule');
        const cManage = document.getElementById('contentManage');

        let groupId = /*[[${group.groupId}]]*/ 0;
        let isMember = /*[[${isMember}]]*/ false;        let canCreateSchedule = /*[[${canCreateSchedule}]]*/ false;        let createNeedsApproval = /*[[${createNeedsApproval}]]*/ false;        let canManageSchedule = /*[[${canManageSchedule}]]*/ false;        let currentUserKey = /*[[${currentUserKey}]]*/ 0;
        try {
            const container = document.querySelector('.container');
            if (container && container.dataset) {
                if (container.dataset.groupId) groupId = Number(container.dataset.groupId) || groupId;
                if (typeof container.dataset.isMember !== 'undefined') { const v = container.dataset.isMember; if (v === 'true' || v === 'false') isMember = (v === 'true'); else isMember = Boolean(v); }                if (typeof container.dataset.canCreateSchedule !== 'undefined') canCreateSchedule = (container.dataset.canCreateSchedule === 'true');                if (typeof container.dataset.createNeedsApproval !== 'undefined') createNeedsApproval = (container.dataset.createNeedsApproval === 'true');                if (typeof container.dataset.canManageSchedule !== 'undefined') canManageSchedule = (container.dataset.canManageSchedule === 'true'); if (container.dataset.currentUserKey) currentUserKey = Number(container.dataset.currentUserKey) || currentUserKey;
            }
        } catch(e) {}

        function activateTab(tab) {
            [tabHome, tabSchedule, tabManage].forEach(t => { if (t) t.classList.remove('active'); });
            [cHome, cSchedule, cManage].forEach(c => { if (c) c.style.display = 'none'; });
            tab.classList.add('active');
            if (tab === tabHome) cHome.style.display = 'grid';
            if (tab === tabSchedule) cSchedule.style.display = 'block';
            if (tab === tabManage) cManage.style.display = 'block';
        }

        const favoriteBtn = document.getElementById('favoriteBtn');
        if (favoriteBtn) {
            favoriteBtn.addEventListener('click', async () => {
                const isFavorite = favoriteBtn.dataset.favorite === 'true';
                const hasFavorite = favoriteBtn.dataset.hasFavorite === 'true';
                const setIcon = (fav) => { favoriteBtn.dataset.favorite = fav ? 'true' : 'false'; favoriteBtn.querySelector('span').textContent = fav ? '★' : '☆'; };
                const toast = (msg) => window.openCommonModal({ title:'완료', content: '<div>'+msg+'</div>', size:'sm' });
                try {
                    if (isFavorite) {
                        const r = await fetch('/groups/'+groupId+'/favorite', { method:'DELETE' });
                        if (!r.ok) throw new Error('failed');
                        setIcon(false); favoriteBtn.dataset.hasFavorite = 'false';
                        toast('우선모임이 해체되었습니다.');
                    } else if (!hasFavorite) {
                        const r = await fetch('/groups/'+groupId+'/favorite', { method:'PUT' });
                        if (!r.ok) throw new Error('failed');
                        setIcon(true); favoriteBtn.dataset.hasFavorite = 'true';
                        toast('우선모임으로 등록되었습니다.');
                    } else {
                        if (!confirm('우선모임을 변경하시겠습니까?')) return;
                        const r = await fetch('/groups/'+groupId+'/favorite', { method:'PUT' });
                        if (!r.ok) throw new Error('failed');
                        setIcon(true); favoriteBtn.dataset.hasFavorite = 'true';
                        toast('우선모임이 변경되었습니다.');
                    }
                } catch (e) {
                    window.openCommonModal({ title:'오류', content:'<div>요청 처리에 실패했습니다.</div>', size:'sm' });
                }
            });
        }

        if (tabHome) tabHome.addEventListener('click', () => activateTab(tabHome));
        if (tabSchedule) tabSchedule.addEventListener('click', () => { activateTab(tabSchedule); loadSchedules(); });
        if (tabManage) tabManage.addEventListener('click', () => { activateTab(tabManage); loadSchedulesForManage(); loadJoinRequests(); loadPendingScheduleList(); loadMembersManage(); });

        try { activateTab(tabHome); setTimeout(() => loadSchedules(), 0); } catch(e) { activateTab(tabHome); }

        // 설명 '더보기' 처리
        (function(){
            const descEl = document.getElementById('groupDescription');
            const moreBtn = document.getElementById('moreBtn');
            if (!descEl || !moreBtn) return;
            function needsMore(el){
                const clone = el.cloneNode(true);
                clone.style.position = 'absolute'; clone.style.visibility='hidden'; clone.style.display='block'; clone.style.webkitLineClamp='none'; clone.style.maxHeight='none'; clone.style.width = el.clientWidth + 'px';
                document.body.appendChild(clone);
                const fullHeight = clone.scrollHeight; const visibleHeight = el.clientHeight; document.body.removeChild(clone);
                return fullHeight > visibleHeight + 2;
            }
            try { if (needsMore(descEl)) { moreBtn.style.display='inline-block'; moreBtn.addEventListener('click', ()=> window.showDescriptionModal(descEl.textContent)); } } catch(e) {}
        })();

        // 가입하기 / 취소 (비회원 전용, 탭 우측)
        // 예/아니오 확인 모달 (가입 신청 / 가입 취소 공용). opts.tone: 'info'(파랑) | 'warning'(주황)
        function openYesNoConfirm(message, onYes, opts){
            opts = opts || {};
            const tone = opts.tone === 'warning' ? 'warning' : 'info';
            const icon = tone === 'warning' ? '⚠️' : 'ℹ️';
            const accentColor = tone === 'warning' ? '#d97706' : '#2563eb';
            const confirmLabel = opts.confirmLabel || '예';

            const con = document.createElement('div'); con.style.cssText = 'display:flex;flex-direction:column;gap:14px;';
            const msg = document.createElement('div'); msg.style.cssText = 'font-size:14px;color:#475569;white-space:pre-wrap;line-height:1.5;'; msg.textContent = message;
            con.appendChild(msg);
            const bRow = document.createElement('div'); bRow.style.cssText = 'display:flex;justify-content:flex-end;gap:8px;';
            const noBtn = document.createElement('button'); noBtn.className = 'tab'; noBtn.textContent = '아니오'; noBtn.onclick = () => window.closeCommonModal && window.closeCommonModal();
            const yesBtn = document.createElement('button'); yesBtn.className = 'tab'; yesBtn.style.cssText = 'background:' + accentColor + ';border:1px solid ' + accentColor + ';color:#fff;'; yesBtn.textContent = confirmLabel;
            yesBtn.onclick = () => onYes(yesBtn);
            bRow.appendChild(noBtn); bRow.appendChild(yesBtn); con.appendChild(bRow);
            window.openCommonModal({ title: icon + ' 확인', content: con, size: 'sm', backdropClose: false, showClose: false });
        }
        function renderJoinButton(latestReq){
            const el = document.getElementById('joinAction');
            if (!el) return;
            el.innerHTML = '';
            if (latestReq && latestReq.status === 'PENDING') {
                const wrap = document.createElement('div'); wrap.className = 'join-pending';
                const badge = document.createElement('span'); badge.className = 'join-pending-badge'; badge.style.cursor = 'pointer'; badge.textContent = '가입 신청 중';
                badge.addEventListener('click', () => {
                    openYesNoConfirm('현재 가입신청 진행 중입니다.\n가입신청을 취소하시겠습니까?', async (yesBtn) => {
                        yesBtn.disabled = true;
                        try {
                            const res = await fetch('/groups/' + groupId + '/join-requests/' + latestReq.requestId, { method: 'DELETE', credentials: 'same-origin' });
                            if (!res.ok) throw new Error('취소에 실패했습니다.');
                            window.closeCommonModal && window.closeCommonModal();
                            renderJoinButton(null);
                        } catch (e) {
                            yesBtn.disabled = false;
                            window.openCommonModal({ title: '오류', content: '<div>' + (e.message || '취소에 실패했습니다.') + '</div>', size: 'sm' });
                        }
                    }, { tone: 'warning', confirmLabel: '예(가입취소)' });
                });
                wrap.appendChild(badge);
                el.appendChild(wrap);
            } else {
                const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;align-items:center;gap:8px;';
                if (latestReq && latestReq.status === 'REJECTED') {
                    const rejBadge = document.createElement('span'); rejBadge.className = 'join-pending-badge'; rejBadge.style.cssText = 'cursor:pointer;background:#fee2e2;color:#991b1b;'; rejBadge.textContent = '가입 거부됨';
                    rejBadge.addEventListener('click', () => {
                        window.openCommonModal({ title: '가입 거부 안내', content: '<div style="white-space:pre-wrap;">' + (latestReq.rejectReason || '거부 사유가 등록되지 않았습니다.') + '</div>', size: 'sm' });
                    });
                    wrap.appendChild(rejBadge);
                }

        const SCHEDULE_CACHE_TTL_MS = 5 * 60 * 1000;

        function defaultScheduleRange() { const now = Date.now(); return { from: now - 30 * 24 * 60 * 60 * 1000, to: now + 60 * 24 * 60 * 60 * 1000 }; }
        function isScheduleCacheFresh() { return scheduleCache.fetchedAt > 0 && (Date.now() - scheduleCache.fetchedAt) < SCHEDULE_CACHE_TTL_MS; }
        function scheduleCacheCovers(from, to) { if (scheduleCache.hasAll) return true; if (scheduleCache.rangeFrom == null) return false; return from >= scheduleCache.rangeFrom && to <= scheduleCache.rangeTo; }
        async function getSchedules(options) {

          const needTo = options.to != null ? options.to : def.to;
          if (!options.forceRefresh && scheduleCacheCovers(needFrom, needTo) && isScheduleCacheFresh()) return scheduleCache.events;

      mgrLink.onclick = () => openAttendeeManageModal(ev);
      capRow.appendChild(mgrLink);
    }
  }

  // 참가 신청/취소 (인원 행 바로 아래)
  if (isConfirmed && isMember) {
    const attendBtnRow = document.createElement('div');
    attendBtnRow.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
    const attBtn = document.createElement('button');
    attBtn.className = 'btn'; attBtn.disabled = true;
    attBtn.style.cssText = 'font-size:13px;width:100%;background:#94a3b8;color:#fff;font-weight:700;border:none;border-radius:8px;padding:8px 0;cursor:default;';
    attBtn.textContent = '참가 신청';
    attendBtnRow.appendChild(attBtn);
    wrap.appendChild(attendBtnRow);
    loadMyAttendance(ev, attendBtnRow, attBtn);
  }
  
  if(ev.description){const descBox=document.createElement('div');descBox.style.cssText='background:#f8fafc;border-radius:6px;padding:10px;font-size:13px;color:#334155;white-space:pre-wrap;line-height:1.6;border:1px solid #e2e8f0;';descBox.textContent=ev.description;const descLabel=document.createElement('div');descLabel.style.cssText='font-size:11px;color:#94a3b8;margin-bottom:4px;';descLabel.textContent='내용';const dw=document.createElement('div');dw.appendChild(descLabel);dw.appendChild(descBox);wrap.appendChild(dw);}
  // 버튼 영역
  const canEdit=(canManageSchedule&&ev.status==='CONFIRMED')||(String(ev.createdBy)===String(currentUserKey)&&ev.status==='PENDING');
  const isActive=ev.status!=='REJECTED'&&ev.status!=='CANCELLED';
  if(isActive||(canManageSchedule&&ev.status==='CONFIRMED')){
    const br=document.createElement('div');br.style.cssText='display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;padding-top:12px;border-top:1px solid #e2e8f0;';
    // 승인/거부 (PENDING + 관리자)
    if(canManageSchedule&&ev.status==='PENDING'){
      const ab=document.createElement('button');ab.className='tab';ab.style.cssText='background:#dcfce7;color:#166534;font-size:13px;';ab.textContent='승인';ab.onclick=()=>{performAction(ev.id,'approve',{btnEl:ab,originalText:'승인',successMsg:'일정이 승인되었습니다.'});};br.appendChild(ab);
      const rb=document.createElement('button');rb.className='tab';rb.style.cssText='background:#fee2e2;color:#991b1b;font-size:13px;';rb.textContent='거부';rb.onclick=()=>{window.closeCommonModal&&window.closeCommonModal();confirmAndAct(ev.id,'reject',{label:'거부',warningMsg:'이 일정을 거부하시겠습니까? 거부 후에는 되돌릴 수 없습니다.'});};br.appendChild(rb);
    }
    // 옵션(⋯) 드롭다운: 수정/취소 (복제는 드롭다운 밖 왼쪽에 별도 버튼으로 배치)
    const menuItems = [];
    if(canEdit){menuItems.push({label:'수정',onClick:()=>{window.closeCommonModal&&window.closeCommonModal();openEditModal(ev.id);}});}
    if(canManageSchedule&&ev.status==='CONFIRMED'){menuItems.push({label:'취소',onClick:()=>{window.closeCommonModal&&window.closeCommonModal();confirmAndAct(ev.id,'cancel',{label:'취소',warningMsg:'이 일정을 취소하시겠습니까? 취소 후에는 복구할 수 없습니다.'});}});}
    const rightGroup=document.createElement('div');rightGroup.style.cssText='display:flex;gap:6px;margin-left:auto;';
    if(ev.status==='CONFIRMED'&&isMember){
      const dupBtn=document.createElement('button');dupBtn.className='tab';dupBtn.style.cssText='font-size:13px;';dupBtn.textContent='복제';
      dupBtn.onclick=()=>{window.closeCommonModal&&window.closeCommonModal();window.openCreateEventModal(new Date(),ev);};
      rightGroup.appendChild(dupBtn);
    }
    if(menuItems.length>0){
      const optWrap=document.createElement('div');optWrap.style.cssText='position:relative;';
      const optBtn=document.createElement('button');optBtn.className='tab';optBtn.style.cssText='font-size:13px;';optBtn.textContent='⋯';optBtn.setAttribute('aria-label','옵션');
      const menu=document.createElement('div');menu.className='opt-menu';
      menuItems.forEach(mi=>{const item=document.createElement('div');item.className='opt-menu-item';item.textContent=mi.label;item.onclick=()=>{menu.style.display='none';mi.onClick();};menu.appendChild(item);});
      optBtn.onclick=(e)=>{
        e.stopPropagation();
        const opening = menu.style.display!=='block';
        menu.style.display = opening ? 'block' : 'none';
        if(opening){document.addEventListener('click', function(){menu.style.display='none';}, {once:true});}
      };
      optWrap.appendChild(optBtn);optWrap.appendChild(menu);rightGroup.appendChild(optWrap);
    }
    if(rightGroup.children.length>0)br.appendChild(rightGroup);
    if(br.children.length>0)wrap.appendChild(br);
  }
  window.openCommonModal({title:ev.title||'일정',content:wrap,size:'md'});
}

// 내 참가 상태에 따라 상단 참가 버튼(attBtn)을 갱신하고, 필요 시 안내 문구/취소 버튼을 추가
// onSuccess 생략 시(상세 모달 호출부) 기존처럼 모달을 닫고 완료 토스트를 띄운다.
// opts.compact === true면 홈탭 카드용 좁은 알약형 버튼/배지 스타일을 사용한다.
async function loadMyAttendance(ev, containerEl, attBtn, onSuccess, opts) {
  const compact = !!(opts && opts.compact);
  const applyBtnStyle = (bg, color, border) => {
    attBtn.style.cssText = compact
      ? 'font-size:12px;padding:6px 14px;border-radius:999px;font-weight:700;white-space:nowrap;cursor:pointer;background:'+bg+';color:'+color+';border:'+(border||'none')+';'
      : 'font-size:13px;width:100%;font-weight:700;border-radius:8px;padding:8px 0;cursor:pointer;background:'+bg+';color:'+color+';border:'+(border||'none')+';';
  };
  const defaultOnSuccess = (msg, color) => {
    window.closeCommonModal && window.closeCommonModal();
    const sd = document.createElement('div'); sd.style.cssText = 'padding:8px 0;color:' + color + ';'; sd.textContent = msg;
    window.openCommonModal({ title: '완료', content: sd, size: 'sm' });
  };
  try {
    const res = await fetch('/api/groups/' + groupId + '/schedules/' + ev.id + '/attendance', { credentials: 'same-origin' });
    const list = res.ok ? await res.json() : [];
    const myAtt = list.find(a => String(a.userKey) === String(currentUserKey));
    if (!myAtt || myAtt.status === 'REJECTED' || myAtt.status === 'CANCELLED') {
      const isRejected = !!myAtt && myAtt.status === 'REJECTED';
      attBtn.disabled = false;
      applyBtnStyle(isRejected ? '#dc2626' : '#2563eb', '#fff');
      attBtn.textContent = isRejected ? '참가 재신청' : '참가 신청';
      attBtn.onclick = async () => {
        const originalLabel = attBtn.textContent;
        attBtn.disabled = true; attBtn.textContent = '처리 중...';
        try {
          const r = await fetch('/api/groups/' + groupId + '/schedules/' + ev.id + '/attend', { method: 'POST', credentials: 'same-origin' });
          if (r.ok) { (onSuccess || (() => defaultOnSuccess('참가 신청이 완료되었습니다.', '#166534')))(); }
          else { const j = await r.json().catch(() => ({})); attBtn.disabled = false; attBtn.textContent = originalLabel; alert(j.message || '신청 실패'); }
        } catch (e) { attBtn.disabled = false; attBtn.textContent = originalLabel; alert(e.message); }
      };
    } else if (myAtt.status === 'PENDING' || myAtt.status === 'CONFIRMED') {
      if (myAtt.status === 'PENDING') {
        const msg = document.createElement('div');
        if (compact) { msg.style.cssText = 'font-size:11px;color:#854d0e;background:#fef9c3;border-radius:999px;padding:2px 8px;white-space:nowrap;'; msg.textContent = '대기중'; }
        else { msg.style.cssText = 'font-size:12px;color:#854d0e;background:#fef9c3;border-radius:6px;padding:6px 10px;'; msg.textContent = '참가 신청 승인 대기 중입니다.'; }
        containerEl.insertBefore(msg, attBtn);
      }
      attBtn.disabled = false;
      applyBtnStyle('#fff1f2', '#be123c', '1px solid #fecaca');
      attBtn.textContent = '참가 취소';
      attBtn.onclick = async () => {
        if (!confirm('참가를 취소하시겠습니까?')) return;
        attBtn.disabled = true;
        try {
          const r = await fetch('/api/groups/' + groupId + '/schedules/' + ev.id + '/attend', { method: 'DELETE', credentials: 'same-origin' });
          if (r.ok) { (onSuccess || (() => defaultOnSuccess('참가 취소되었습니다.', '#64748b')))(); }
          else { const j = await r.json().catch(() => ({})); attBtn.disabled = false; alert(j.message || '취소 실패'); }
        } catch (e) { attBtn.disabled = false; alert(e.message); }
      };
    }
  } catch (e) {
    const errDiv = document.createElement('div'); errDiv.style.cssText = 'color:#dc2626;font-size:13px;'; errDiv.textContent = '참가 상태를 불러오지 못했습니다.';
    containerEl.appendChild(errDiv);
  }
}

// 인원/정원 값에 호버(PC)/탭(모바일) 시 열리는 읽기 전용 명단 팝오버
function attachRosterPopover(triggerEl, anchorEl, scheduleId) {
  let box = null;
  let loaded = false;
  const sL = { PENDING: '대기', CONFIRMED: '확정', REJECTED: '거부', CANCELLED: '취소' };
  const sC = { PENDING: 'background:#fef9c3;color:#854d0e;', CONFIRMED: 'background:#dcfce7;color:#166534;', REJECTED: 'background:#fee2e2;color:#991b1b;', CANCELLED: 'background:#f1f5f9;color:#64748b;' };
  function ensureBox() {
    if (box) return box;
    box = document.createElement('div'); box.className = 'roster-popover'; box.textContent = '불러오는 중...';
    anchorEl.appendChild(box);
    return box;
  }
  async function ensureLoaded() {
    if (loaded) return;
    loaded = true;
    const b = ensureBox();
    try {
      const res = await fetch('/api/groups/' + groupId + '/schedules/' + scheduleId + '/attendance', { credentials: 'same-origin' });
      const list = res.ok ? await res.json() : [];
      const rows = list.filter(a => a.status === 'CONFIRMED' || a.status === 'PENDING');
      b.innerHTML = '';
      if (rows.length === 0) {
        const em = document.createElement('div'); em.style.cssText = 'font-size:12px;color:#94a3b8;'; em.textContent = '참가자가 없습니다.'; b.appendChild(em);
      } else {
        rows.forEach(a => {
          const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;';
          const ns = document.createElement('span'); ns.textContent = a.displayName || '(알 수 없음)';
          const sb = document.createElement('span'); sb.style.cssText = (sC[a.status] || '') + 'padding:1px 6px;border-radius:999px;font-size:11px;'; sb.textContent = sL[a.status] || a.status;
          row.appendChild(ns); row.appendChild(sb); b.appendChild(row);
        });
      }
    } catch (e) {
      loaded = false;
      b.innerHTML = ''; const errEl = document.createElement('div'); errEl.style.cssText = 'font-size:12px;color:#dc2626;'; errEl.textContent = '명단을 불러오지 못했습니다.'; b.appendChild(errEl);
    }
  }
  function show() { ensureBox().style.display = 'block'; ensureLoaded(); }
  function hide() { if (box) box.style.display = 'none'; }
  triggerEl.addEventListener('mouseenter', show);
  triggerEl.addEventListener('mouseleave', hide);
  triggerEl.addEventListener('click', (e) => {
    e.stopPropagation();
    const opening = !box || box.style.display !== 'block';
    if (opening) {
      show();
      document.addEventListener('click', function (ev2) {
        if (box && !box.contains(ev2.target) && ev2.target !== triggerEl) hide();
      }, { once: true });
    } else {
      hide();
    }
  });
}

// '참가자 관리' 모달: 참가자 개별 승인·거부(신청) / 참석확인(체크인, 보기·수정) / 신청 이력
function openAttendeeManageModal(ev) {
  const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

  // 신청/참석확인 탭 헤더 (페이지 레벨 activateTab과 동일한 방식을 모달 스코프로 축소)
  const tabRow = document.createElement('div'); tabRow.style.cssText = 'display:flex;gap:6px;border-bottom:1px solid #e2e8f0;padding-bottom:8px;';
  const tabApply = document.createElement('div'); tabApply.className = 'tab active'; tabApply.textContent = '신청';
  const tabCheck = document.createElement('div'); tabCheck.className = 'tab'; tabCheck.textContent = '참석확인';
  tabRow.appendChild(tabApply); tabRow.appendChild(tabCheck);
  wrap.appendChild(tabRow);

  const contentApply = document.createElement('div'); contentApply.style.cssText = 'display:flex;flex-direction:column;gap:6px;min-height:20px;';
  const contentCheck = document.createElement('div'); contentCheck.style.cssText = 'display:none;flex-direction:column;gap:6px;min-height:20px;';
  wrap.appendChild(contentApply); wrap.appendChild(contentCheck);

  let checkLoaded = false;
  function activateLocalTab(tab) {
    [tabApply, tabCheck].forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    contentApply.style.display = (tab === tabApply) ? 'flex' : 'none';
    contentCheck.style.display = (tab === tabCheck) ? 'flex' : 'none';
    if (tab === tabCheck && !checkLoaded) { checkLoaded = true; loadCheckTab(); }
  }
  tabApply.onclick = () => activateLocalTab(tabApply);
  tabCheck.onclick = () => activateLocalTab(tabCheck);

  const hC = { PENDING: 'background:#fef9c3;color:#854d0e;', CONFIRMED: 'background:#dcfce7;color:#166534;', REJECTED: 'background:#fee2e2;color:#991b1b;', CANCELLED: 'background:#f1f5f9;color:#64748b;' };
  const hL = { PENDING: '신청', CONFIRMED: '승인', REJECTED: '거부', CANCELLED: '취소' };
  const aC = { NONE: 'background:#f1f5f9;color:#64748b;', ATTENDED: 'background:#dcfce7;color:#166534;', NOSHOW: 'background:#fee2e2;color:#991b1b;' };
  const aL = { NONE: '미체크', ATTENDED: '참석', NOSHOW: '불참' };

  // ── "신청" 탭: 목록 / 이력 두 하위 뷰를 같은 컨테이너 안에서 토글 ──────────────────

  async function loadApplyTab() {
    contentApply.innerHTML = '<div class="muted">불러오는 중...</div>';
    try {
      const r = await fetch('/api/groups/' + groupId + '/schedules/' + ev.id + '/attendance', { credentials: 'same-origin' });
      const list = r.ok ? await r.json() : [];
      contentApply.innerHTML = '';

      const headerRow = document.createElement('div'); headerRow.style.cssText = 'display:flex;justify-content:flex-end;';
      const historyLink = document.createElement('span'); historyLink.textContent = '이력보기';
      historyLink.style.cssText = 'color:#2563eb;font-weight:600;font-size:12px;cursor:pointer;';
      historyLink.onclick = () => loadHistoryView();
      headerRow.appendChild(historyLink);
      contentApply.appendChild(headerRow);

      const pending = list.filter(a => a.status === 'PENDING');
      const confirmed = list.filter(a => a.status === 'CONFIRMED');
      if (pending.length === 0 && confirmed.length === 0) {
        const em = document.createElement('div'); em.style.cssText = 'font-size:13px;color:#94a3b8;'; em.textContent = '참가자가 없습니다.'; contentApply.appendChild(em);
        return;
      }
      if (pending.length > 0) {
        const h = document.createElement('div'); h.style.cssText = 'font-size:12px;font-weight:700;color:#854d0e;margin-top:4px;'; h.textContent = '승인 대기'; contentApply.appendChild(h);
        pending.forEach(a => contentApply.appendChild(renderApplyRow(a)));
      }
      if (confirmed.length > 0) {
        const h2 = document.createElement('div'); h2.style.cssText = 'font-size:12px;font-weight:700;color:#166534;margin-top:10px;'; h2.textContent = '승인 완료'; contentApply.appendChild(h2);
        confirmed.forEach(a => contentApply.appendChild(renderApplyRow(a)));
      }
    } catch (e) {
      contentApply.innerHTML = '';
      const errDiv = document.createElement('div'); errDiv.style.cssText = 'color:#dc2626;font-size:13px;'; errDiv.textContent = '참가자 정보를 불러오지 못했습니다.'; contentApply.appendChild(errDiv);
    }
  }

  async function loadHistoryView() {
    contentApply.innerHTML = '<div class="muted">불러오는 중...</div>';
    try {
      const r = await fetch('/api/groups/' + groupId + '/schedules/' + ev.id + '/attendance/history', { credentials: 'same-origin' });
      const list = r.ok ? await r.json() : [];
      contentApply.innerHTML = '';

      const backLink = document.createElement('div'); backLink.textContent = '← 신청 목록';
      backLink.style.cssText = 'color:#2563eb;font-weight:600;font-size:12px;cursor:pointer;margin-bottom:4px;';
      backLink.onclick = () => loadApplyTab();
      contentApply.appendChild(backLink);

      if (list.length === 0) {
        const em = document.createElement('div'); em.style.cssText = 'font-size:13px;color:#94a3b8;'; em.textContent = '이력이 없습니다.'; contentApply.appendChild(em);
        return;
      }

      const filterRow = document.createElement('div'); filterRow.style.cssText = 'display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;';
      const selStyle = 'font-size:12px;padding:4px 6px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;';
      const statusSel = document.createElement('select'); statusSel.style.cssText = selStyle;
      statusSel.innerHTML = '<option value="">상태 전체</option>' + Object.keys(hL).map(k => '<option value="' + k + '">' + hL[k] + '</option>').join('');
      const targetNames = Array.from(new Set(list.map(h => h.displayName || '(알 수 없음)')));
      const targetSel = document.createElement('select'); targetSel.style.cssText = selStyle;
      targetSel.innerHTML = '<option value="">대상 전체</option>' + targetNames.map(n => '<option value="' + n + '">' + n + '</option>').join('');
      filterRow.appendChild(statusSel); filterRow.appendChild(targetSel);
      contentApply.appendChild(filterRow);

      const scrollWrap = document.createElement('div'); scrollWrap.style.cssText = 'max-height:320px;overflow-y:auto;border:1px solid #f1f5f9;border-radius:8px;';
      const table = document.createElement('table'); table.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;';
      const thead = document.createElement('thead');
      thead.innerHTML = '<tr style="position:sticky;top:0;background:#fff;border-bottom:1px solid #e2e8f0;">'
        + '<th style="text-align:left;padding:6px 8px;">시각</th>'
        + '<th style="text-align:left;padding:6px 8px;">상태</th>'
        + '<th style="text-align:left;padding:6px 8px;">대상</th>'
        + '<th style="text-align:left;padding:6px 8px;">처리자</th></tr>';
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      table.appendChild(tbody);
      scrollWrap.appendChild(table);
      contentApply.appendChild(scrollWrap);

      function renderRows() {
        tbody.innerHTML = '';
        const filtered = list.filter(h =>
          (!statusSel.value || h.status === statusSel.value) &&
          (!targetSel.value || (h.displayName || '(알 수 없음)') === targetSel.value)
        );
        if (filtered.length === 0) {
          const tr = document.createElement('tr');
          tr.innerHTML = '<td colspan="4" style="padding:12px;text-align:center;color:#94a3b8;">조건에 맞는 이력이 없습니다.</td>';
          tbody.appendChild(tr);
          return;
        }
        filtered.forEach(h => {
          const tr = document.createElement('tr'); tr.style.cssText = 'border-bottom:1px solid #f1f5f9;';
          const tdWhen = document.createElement('td'); tdWhen.style.cssText = 'padding:5px 8px;color:#94a3b8;white-space:nowrap;'; tdWhen.textContent = h.createdAt ? new Date(h.createdAt).toLocaleString() : '-';
          const tdStatus = document.createElement('td'); tdStatus.style.cssText = 'padding:5px 8px;';
          const badge = document.createElement('span'); badge.style.cssText = (hC[h.status] || '') + 'padding:1px 8px;border-radius:999px;font-weight:600;'; badge.textContent = hL[h.status] || h.status;
          tdStatus.appendChild(badge);
          const tdTarget = document.createElement('td'); tdTarget.style.cssText = 'padding:5px 8px;'; tdTarget.textContent = h.displayName || '(알 수 없음)';
          const tdActor = document.createElement('td'); tdActor.style.cssText = 'padding:5px 8px;color:#64748b;'; tdActor.textContent = h.actorDisplayName || '-';
          tr.appendChild(tdWhen); tr.appendChild(tdStatus); tr.appendChild(tdTarget); tr.appendChild(tdActor);
          tbody.appendChild(tr);
        });
      }
      statusSel.onchange = renderRows;
      targetSel.onchange = renderRows;
      renderRows();
    } catch (e) {
      contentApply.innerHTML = '';
      const errDiv = document.createElement('div'); errDiv.style.cssText = 'color:#dc2626;font-size:13px;'; errDiv.textContent = '이력을 불러오지 못했습니다.'; contentApply.appendChild(errDiv);
    }
  }

  function renderApplyRow(a) {
    const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap;';
    const ns = document.createElement('span'); ns.textContent = a.displayName || '(알 수 없음)';
    row.appendChild(ns);
    const canMgr = canManageSchedule || String(ev.createdBy) === String(currentUserKey);
    if (canMgr && a.status === 'PENDING') {
      const appB = document.createElement('button'); appB.className = 'tab'; appB.style.cssText = 'padding:2px 8px;font-size:11px;background:#dcfce7;color:#166534;margin-left:auto;'; appB.textContent = '승인';
      appB.onclick = async () => {
        appB.disabled = true;
        try {

                const evs = eventsByDate[dateKey] || []; if (evs.length>0){ const _has=s=>evs.some(it=>it.status===s); const _top=_has('PENDING')?'PENDING':_has('CONFIRMED')?'CONFIRMED':_has('REJECTED')?'REJECTED':'CANCELLED'; const _sc=_top==='PENDING'?'bg-yellow-50 text-yellow-700 border-yellow-100':_top==='REJECTED'?'bg-red-50 text-red-600 border-red-100':_top==='CANCELLED'?'bg-gray-50 text-gray-400 border-gray-200':'bg-blue-50 text-blue-700 border-blue-100'; const countBadge = document.createElement('span'); countBadge.className='inline-block self-start px-1 py-0.5 rounded border text-[9px] sm:text-xs font-semibold whitespace-nowrap '+_sc; countBadge.textContent = (evs.length>99 ? '99+' : String(evs.length))+'건'; cell.appendChild(countBadge); }

        async function loadSchedulesForManage(){ const el = document.getElementById('schedulesList'); if(!el) return; el.innerHTML = '<div class="muted">일정 목록을 불러오는 중...</div>'; try{ const data = await getSchedules({ all: true }); el.innerHTML=''; if(!Array.isArray(data)||data.length===0){ el.innerHTML='<div class="muted">일정이 없습니다.</div>'; return; } data.forEach(ev=>{ const item=document.createElement('div'); item.className='member-item'; const sMap={'PENDING':'🟡 승인대기','CONFIRMED':'🟢 승인','REJECTED':'🔴 반려','CANCELLED':'⚫ 취소'}; const left=document.createElement('div'); left.innerHTML='<div style="font-weight:700">'+(ev.title||'일정')+'</div><div class="member-meta">'+new Date(ev.start).toLocaleString()+' &middot; '+(sMap[ev.status]||ev.status||'-')+'</div>'; const btns=document.createElement('div'); btns.style.display='flex'; btns.style.gap='4px'; if(canManageSchedule&&(ev.status==='PENDING'||ev.status==='CONFIRMED')){ const edb=document.createElement('button'); edb.textContent='수정'; edb.className='tab'; edb.style.background='#eff6ff'; edb.style.color='#1d4ed8'; edb.onclick=()=>openEditModal(ev.id); btns.appendChild(edb); } if(canManageSchedule&&ev.status==='PENDING'){ const ab=document.createElement('button'); ab.textContent='승인'; ab.className='tab'; ab.style.background='#dcfce7'; ab.style.color='#166534'; ab.onclick=()=>{performAction(ev.id,'approve',{btnEl:ab,originalText:'승인',successMsg:'일정이 승인되었습니다.'});}; const rb=document.createElement('button'); rb.textContent='반려'; rb.className='tab'; rb.style.background='#fee2e2'; rb.style.color='#991b1b'; rb.onclick=()=>{confirmAndAct(ev.id,'reject',{label:'거부',warningMsg:'이 일정을 거부하시겠습니까? 거부 후에는 되돌릴 수 없습니다.'});}; btns.appendChild(ab); btns.appendChild(rb); } if(canManageSchedule&&(ev.status==='PENDING'||ev.status==='CONFIRMED')){ const cb=document.createElement('button'); cb.textContent='취소'; cb.className='tab'; cb.style.background='#fff1f2'; cb.style.color='#be123c'; cb.onclick=()=>{confirmAndAct(ev.id,'cancel',{label:'취소',wa       const r=await fetch('/api/groups/'+groupId+'/schedules/'+scheduleId,{method:'PATCH',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});

    }catch(err){_showErr(err.message||'수정 중 오류가 발생했습니다.');}
  });
