<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카카오 자동 로그인/회원가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3 {
            color: #1a1a1a;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            overflow-x: auto;
        }
        #token-info {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>카카오 로그인 상태</h1>
        <div id="token-info"></div>
    </div>

    <script>
    // JWT 만료 여부 검사 함수
    function isTokenExpired(token) {
        if (!token) return true;
        try {
            const payloadBase64 = token.split('.')[1];
            const payloadJson = atob(payloadBase64.replace(/-/g, '+').replace(/_/g, '/'));
            const payload = JSON.parse(payloadJson);
            const now = Math.floor(Date.now() / 1000);
            return payload.exp && payload.exp < now;
        } catch (e) {
            return true;
        }
    }

    function kakaoLogin() {
        const REST_API_KEY = 'aa4268b0d218c509562ca2ee74f23d94';
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const kakaoAuthUrl =
            'https://kauth.kakao.com/oauth/authorize?' +
            'response_type=code' +
            '&client_id=' + REST_API_KEY +
            '&redirect_uri=' + encodeURIComponent(REDIRECT_URI);

        window.location.href = kakaoAuthUrl;
    }

    function getQueryParam(name) {
        return new URL(window.location.href).searchParams.get(name);
    }
    
    function displayTokens() {
        const accessToken = localStorage.getItem('access_token');
        const idToken = localStorage.getItem('id_token');
        const tokenInfoDiv = document.getElementById('token-info');

        if (accessToken && idToken) {
            let idTokenPayload = {};
            try {
                // ID 토큰의 payload(내용)를 디코딩하고 파싱
                const payloadBase64 = idToken.split('.')[1];
                idTokenPayload = JSON.parse(atob(payloadBase64.replace(/-/g, '+').replace(/_/g, '/')));
            } catch (e) {
                console.error("ID 토큰 파싱 실패:", e);
            }

            const expDate = idTokenPayload.exp ? new Date(idTokenPayload.exp * 1000).toLocaleString() : '정보 없음';
            const userId = idTokenPayload.sub || idTokenPayload.aud || '정보 없음';

            tokenInfoDiv.innerHTML = `
                <h2>로그인 성공! 🎉</h2>
                <p><strong>토큰 정보가 브라우저에 안전하게 저장되었습니다.</strong></p>
                <hr>
                
                <h3>ID 토큰 요약 정보</h3>
                <ul>
                    <li><strong>사용자 ID:</strong> ${userId}</li>
                    <li><strong>토큰 만료 시간:</strong> ${expDate}</li>
                </ul>

                <h3>원본 Access Token</h3>
                <pre>${accessToken}</pre>
                
                <h3>원본 ID Token</h3>
                <pre>${idToken}</pre>
            `;
        } else {
            tokenInfoDiv.innerHTML = '<h2>로그아웃 상태입니다. 😥</h2><p>카카오 로그인 버튼을 눌러 로그인을 시작하세요.</p>';
        }
    }
    
    async function handleKakaoCallback() {
        const code = getQueryParam('code');
        if (code) {
            try {
                const response = await fetch('/login/kakao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ code: code })
                });

                if (response.ok) {
                    const result = await response.json();
                    // 서버가 HttpOnly 쿠키에 토큰을 설정함. 클라이언트 측 저장은 하지 않음.
                    window.history.replaceState({}, document.title, window.location.pathname);
                    // 리다이렉트: referer 경로(원래 보냈던 페이지)로 돌아가거나 기본은 메인('/')로 이동
                    const returnTo = window.location.origin + (result.return_path || '/');
                    window.location.href = returnTo;
                } else {
                    const error = await response.json();
                    alert(`로그인 처리 중 오류가 발생했습니다: ${error.message || '알 수 없는 오류'}`);
                    console.error('서버 오류:', error);
                }
            } catch (err) {
                alert('네트워크 오류');
                console.error('네트워크 오류:', err);
            }
        }
    }

    window.onload = async function() {
        const code = getQueryParam('code');
        if (code) {
            await handleKakaoCallback();
        } else {
            kakaoLogin();
        }
    };
    </script>
</body>
</html>
