<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카카오 자동 로그인/회원가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3 {
            color: #1a1a1a;
        }
        pre {
            background-color: #f4f4f4;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
            overflow-x: auto;
        }
        #token-info {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>카카오 로그인 상태</h1>
        <div id="token-info"></div>
    </div>

    <script>
    const KAKAO_REST_API_KEY = 'aa4268b0d218c509562ca2ee74f23d94';

    function getQueryParam(name) {
        return new URL(window.location.href).searchParams.get(name);
    }

    function buildRedirectUri() {
        return window.location.origin + window.location.pathname;
    }

    function buildKakaoAuthUrl(redirectUri) {
        const base = 'https://kauth.kakao.com/oauth/authorize?response_type=code';
        return base + '&client_id=' + encodeURIComponent(KAKAO_REST_API_KEY) + '&redirect_uri=' + encodeURIComponent(redirectUri);
    }

    async function postCodeToServer(code, redirectUri, returnTo) {
        const payload = { code: code, redirectUri: redirectUri, returnTo: returnTo };
        const resp = await fetch('/login/kakao', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(payload)
        });
        return resp;
    }

    function redirectToKakaoAuth() {
        const redirectUri = buildRedirectUri();
        window.location.href = buildKakaoAuthUrl(redirectUri);
    }

    async function processKakaoCallback() {
        const code = getQueryParam('code');
        if (!code) return;

        try {
            const redirectUri = buildRedirectUri();
            const returnToParam = new URL(window.location.href).searchParams.get('returnTo') || '/';
            const response = await postCodeToServer(code, redirectUri, returnToParam);

            if (response.ok) {
                window.location.href = '/';
                return;
            }

            let err = { message: '알 수 없는 오류' };
            try { err = await response.json(); } catch (e) { /* 파싱 실패 무시 */ }
            alert(`로그인 처리 중 오류가 발생했습니다: ${err.message || '알 수 없는 오류'}`);
            console.error('서버 오류:', err);
        } catch (err) {
            alert('네트워크 오류');
            console.error('네트워크 오류:', err);
        }
    }

    window.onload = async function() {
        const code = getQueryParam('code');
        if (code) {
            await processKakaoCallback();
        } else {
            redirectToKakaoAuth();
        }
    };
    </script>
</body>
</html>
